<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sculptural Spaces 杂志级海报</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入高级衬线字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400;500;600;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #dfdad5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            gap: 1.5rem;
            font-family: 'Noto Serif SC', serif;
            transition: all 0.5s ease-in-out;
        }

        /* 桌面端布局自适应 */
        @media (min-width: 1024px) {
            body.panel-left {
                flex-direction: row;
            }
            body.panel-right {
                flex-direction: row-reverse;
            }
            body {
                gap: 4rem;
                padding: 2rem;
            }
        }
        
        /* 智能响应式海报容器外包装 */
        .poster-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 1.25rem;
            box-shadow: 0 45px 90px -25px rgba(43, 37, 33, 0.28), 0 25px 45px -18px rgba(43, 37, 33, 0.15);
            transition: aspect-ratio 0.8s cubic-bezier(0.16, 1, 0.3, 1), height 0.8s cubic-bezier(0.16, 1, 0.3, 1), max-width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 3:4 比例状态 */
        .poster-wrapper.ratio-3-4 {
            aspect-ratio: 3 / 4;
            height: 78vh;
            max-width: calc(78vh * 3 / 4);
        }

        /* 9:16 比例状态 */
        .poster-wrapper.ratio-9-16 {
            aspect-ratio: 9 / 16;
            height: 82vh;
            max-width: calc(82vh * 9 / 16);
        }

        /* 移动端特殊适配 */
        @media (max-width: 1023px) {
            .poster-wrapper.ratio-3-4 {
                height: auto;
                aspect-ratio: 3 / 4;
                max-width: 440px;
            }
            .poster-wrapper.ratio-9-16 {
                height: auto;
                aspect-ratio: 9 / 16;
                max-width: 380px;
            }
        }

        /* 纯净截图区域 */
        .poster-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--container-bg, #f2ece7);
            overflow: hidden;
            user-select: none;
        }

        /* 背景图片：不添加任何CSS颜色滤镜，还原自然原图画质 */
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            position: absolute;
            top: 0;
            left: 0;
            filter: none !important; /* 彻底杜绝任何底图颜色干扰 */
            transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 鼠标悬停时激活呼吸感微缩放效果 */
        .poster-container:hover .bg-image {
            transform: scale(1.04);
        }

        /* ⚡️ 导出防护锁 */
        .is-exporting .bg-image {
            transform: none !important;
            transition: none !important;
        }

        /* 提取全局主题变量 */
        :root {
            --text-primary-color: #26211e;
            --text-secondary-color: #615751;
            --text-tertiary-color: rgba(38, 33, 30, 0.42);
            --container-bg: #f2ece7;
            
            /* 采用中性无色相渐变（纯白到绝对透明），既保护底色纯粹，又确保文字高亮可读 */
            --scrim-color-strong: rgba(255, 255, 255, 0.82); 
            --scrim-color-soft: rgba(255, 255, 255, 0.35);   
            --scrim-color-transparent: rgba(255, 255, 255, 0); 
            --text-shadow-subtle: 0 1px 2px rgba(255, 255, 255, 0.4); 
            
            --logo-filter: grayscale(1) brightness(0.12) contrast(1.25) opacity(0.9);
        }

        .font-eng { font-family: 'Cormorant Garamond', serif; }
        
        .text-primary {
            color: var(--text-primary-color);
            text-shadow: var(--text-shadow-subtle);
            transition: color 0.8s ease, text-shadow 0.8s ease;
        }
        .text-secondary {
            color: var(--text-secondary-color);
            text-shadow: var(--text-shadow-subtle);
            transition: color 0.8s ease, text-shadow 0.8s ease;
        }
        .text-tertiary {
            color: var(--text-tertiary-color);
            transition: color 0.8s ease;
        }
        
        /* 品牌 Logo 容器定位 */
        #block-logo {
            position: absolute;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 25;
        }
        
        /* 排版系统样式 */
        #block-title, #block-body, #decor-elements {
            position: absolute;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 15;
        }
        .scrim-layer {
            position: absolute;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 5;
        }
        
        /* ---------------------------------
           🎯 极限制重主标题核心样式声明
           ---------------------------------*/
        .title-main {
            font-family: 'Noto Serif SC', serif;
        }
        .title-main span {
            display: block;
            white-space: nowrap; 
        }
        /* “阅尽繁华，归于” 设定为轻灵、纤细的宋体（Weight 200） */
        #title-part1 {
            font-weight: 200 !important;
        }
        /* “一壁静谧” 采用极富雕刻质感的重黑宋体（Weight 900） */
        #title-part2 {
            font-weight: 900 !important;
        }
        
        /* ---------------------------------
           🌟 7 大全新极简无横线布局系统 (Whitespace Architecture)
           ---------------------------------*/
        
        /* 布局 1：经典极简 (右侧纵排 + 左下横排) */
        .layout-1 #block-logo { top: 3.5rem; left: 3rem; transform: none; }
        .layout-1 #block-title { top: 3.5rem; right: 3rem; height: 60%; display: flex; gap: 2.25rem; align-items: flex-start; }
        .layout-1 .title-main { writing-mode: vertical-rl; font-size: 2.45rem; letter-spacing: 0.48em; line-height: 1.55; }
        .layout-1 .title-main #title-part2 { margin-top: 4.5rem; }
        .layout-1 .title-sub-group { writing-mode: vertical-rl; display: flex; flex-direction: column; align-items: center; gap: 1.75rem; margin-top: 1.5rem; }
        
        /* ⚡️ 针对 Layout 1 中英文纵排 html2canvas 极致兼容性补丁 */
        .layout-1 #subtitle-eng {
            writing-mode: horizontal-tb !important;
            display: inline-block;
            transform: rotate(90deg);
            transform-origin: center center;
            white-space: nowrap;
            margin: 3.2rem -2.5rem !important; /* 精确物理对齐，完全解决 html2canvas 导出时英文堆叠变形的问题 */
        }

        .layout-1 #block-body { bottom: 3.5rem; left: 3rem; width: 62%; }
        .layout-1 .body-content { text-align: justify; writing-mode: horizontal-tb; line-height: 1.95; }
        .layout-1 .scrim-title { top: 0; right: 0; width: 70%; height: 75%; background: radial-gradient(ellipse at top right, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 55%, var(--scrim-color-transparent) 100%); }
        .layout-1 .scrim-body { bottom: 0; left: 0; width: 80%; height: 50%; background: radial-gradient(ellipse at bottom left, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 55%, var(--scrim-color-transparent) 100%); }
        /* 右上角定位出版细节 */
        .layout-1 #decor-elements { top: 3.5rem; right: 10.5rem; display: flex; flex-direction: column; align-items: flex-end; gap: 0.15rem; }
        .layout-1 #decor-elements .decor-badge { font-family: 'Cormorant Garamond', serif; font-size: 0.72rem; font-style: italic; letter-spacing: 0.15em; opacity: 0.65; }

        /* 布局 2：电影中轴 (极致纯净的完美对称) */
        .layout-2 #block-logo { top: 4rem; left: 50%; transform: translateX(-50%); }
        .layout-2 #block-title { bottom: 4.5rem; left: 0; width: 100%; height: auto; display: flex; flex-direction: column; align-items: center; gap: 1.75rem; }
        .layout-2 .title-main { writing-mode: horizontal-tb; font-size: 2.15rem; letter-spacing: 0.38em; text-align: center; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-2 .title-main #title-part2 { margin-top: 0; } 
        .layout-2 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .layout-2 #block-body { top: 9.5rem; left: 50%; transform: translateX(-50%); width: 75%; } 
        .layout-2 .body-content { text-align: center; writing-mode: horizontal-tb; line-height: 2; }
        .layout-2 .scrim-title { bottom: 0; left: 0; width: 100%; height: 55%; background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 45%, var(--scrim-color-transparent) 100%); }
        .layout-2 .scrim-body { top: 0; left: 0; width: 100%; height: 45%; background: linear-gradient(to bottom, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 45%, var(--scrim-color-transparent) 100%); }
        /* 底端精细平衡字 */
        .layout-2 #decor-elements { bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; justify-content: center; width: 100%; }
        .layout-2 #decor-elements .decor-badge { font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; letter-spacing: 0.45em; opacity: 0.5; }

        /* 布局 3：现代画册 (斜角视线，不含任何修饰线) */
        .layout-3 #block-logo { bottom: 4rem; left: 3rem; transform: none; }
        .layout-3 #block-title { top: 4rem; left: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 1.5rem; }
        .layout-3 .title-main { writing-mode: horizontal-tb; font-size: 2.45rem; letter-spacing: 0.28em; text-align: left; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-3 .title-main #title-part2 { margin-top: 0; }
        .layout-3 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row; align-items: center; gap: 1.2rem; }
        .layout-3 #block-body { bottom: 4rem; right: 3rem; width: 56%; transform: translateX(0); }
        .layout-3 .body-content { text-align: right; writing-mode: horizontal-tb; line-height: 2.05; }
        .layout-3 .scrim-title { top: 0; left: 0; width: 85%; height: 65%; background: radial-gradient(ellipse at top left, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 50%, var(--scrim-color-transparent) 100%); }
        .layout-3 .scrim-body { bottom: 0; right: 0; width: 85%; height: 60%; background: radial-gradient(ellipse at bottom right, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 50%, var(--scrim-color-transparent) 100%); }
        /* 左下角小徽标 */
        .layout-3 #decor-elements { bottom: 6.5rem; left: 3rem; display: flex; flex-direction: column; align-items: flex-start; gap: 0.2rem; }
        .layout-3 #decor-elements .decor-badge { font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; letter-spacing: 0.25em; opacity: 0.55; font-weight: 500; }

        /* 布局 4：先锋解构 (横纵交汇结构，极净极简) */
        .layout-4 #block-logo { top: 4rem; right: 3rem; transform: none; }
        .layout-4 #block-title { bottom: 4rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 1.5rem; }
        .layout-4 .title-main { writing-mode: horizontal-tb; font-size: 2.35rem; letter-spacing: 0.28em; text-align: right; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-4 .title-main #title-part2 { margin-top: 0; }
        .layout-4 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row-reverse; align-items: center; gap: 1.2rem; }
        .layout-4 #block-body { top: 4rem; left: 3rem; width: auto; height: 50%; transform: translateX(0); }
        .layout-4 .body-content { text-align: left; writing-mode: vertical-rl; display: flex; flex-direction: row-reverse; justify-content: flex-start; gap: 1.5rem; line-height: 2.25; }
        .layout-4 .scrim-title { bottom: 0; right: 0; width: 85%; height: 55%; background: radial-gradient(ellipse at bottom right, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 50%, var(--scrim-color-transparent) 100%); }
        .layout-4 .scrim-body { top: 0; left: 0; width: 65%; height: 75%; background: radial-gradient(ellipse at top left, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 50%, var(--scrim-color-transparent) 100%); }
        /* 侧端出版注释 */
        .layout-4 #decor-elements { top: 7.5rem; right: 3rem; display: flex; flex-direction: column; align-items: flex-end; }
        .layout-4 #decor-elements .decor-badge { font-family: 'Cormorant Garamond', serif; font-size: 0.72rem; letter-spacing: 0.25em; opacity: 0.6; }

        /* 布局 5：美术馆展签 (依靠排版密度的自洽性，彻底拿掉分割线) */
        .layout-5 #block-logo { top: 4rem; right: 3rem; transform: none; }
        .layout-5 #block-title { bottom: 10rem; left: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 1.25rem; }
        .layout-5 .title-main { writing-mode: horizontal-tb; font-size: 2.25rem; letter-spacing: 0.22em; text-align: left; display: flex; flex-direction: column; gap: 0.6rem; }
        .layout-5 .title-main #title-part2 { margin-top: 0; }
        .layout-5 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row; align-items: center; gap: 1.2rem; }
        .layout-5 #block-body { bottom: 3rem; left: 3rem; width: 72%; transform: translateX(0); }
        .layout-5 .body-content { text-align: justify; writing-mode: horizontal-tb; line-height: 1.9; }
        .layout-5 .scrim-title { bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 55%, var(--scrim-color-transparent) 100%); }
        .layout-5 .scrim-body { opacity: 0; } 
        /* 展陈规格细节 */
        .layout-5 #decor-elements { bottom: 3rem; right: 3rem; display: flex; flex-direction: column; align-items: flex-end; }
        .layout-5 #decor-elements .decor-badge { font-family: 'Cormorant Garamond', serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.12em; opacity: 0.5; }

        /* 布局 6：无界视界 (纯文字分栏，无横线区隔，完美跨页感) */
        .layout-6 #block-logo { top: 4rem; left: 3rem; transform: none; }
        .layout-6 #block-title { top: 7.5rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 1.25rem; }
        .layout-6 .title-main { writing-mode: horizontal-tb; font-size: 2.55rem; letter-spacing: 0.28em; text-align: left; display: flex; flex-direction: row; flex-wrap: wrap; gap: 0.5rem; }
        .layout-6 .title-main #title-part2 { margin-top: 0; }
        .layout-6 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row; align-items: center; gap: 1.25rem; }
        .layout-6 #block-body { bottom: 4rem; left: 3rem; right: 3rem; width: auto; transform: none; }
        .layout-6 .body-content { display: flex; flex-direction: row; justify-content: space-between; gap: 2.5rem; text-align: left; writing-mode: horizontal-tb; line-height: 1.95; }
        .layout-6 #body-text1 { width: 48%; }
        .layout-6 #body-text2 { width: 48%; margin-top: 0 !important; }
        .layout-6 .scrim-title { top: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to bottom, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 45%, var(--scrim-color-transparent) 100%); }
        .layout-6 .scrim-body { bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 45%, var(--scrim-color-transparent) 100%); }
        /* 顶部页眉 */
        .layout-6 #decor-elements { top: 4rem; right: 3rem; display: flex; align-items: center; gap: 0.5rem; }
        .layout-6 #decor-elements .decor-badge { font-family: 'Cormorant Garamond', serif; font-size: 0.72rem; letter-spacing: 0.25em; opacity: 0.6; }

        /* 布局 7：独立宣言 (大画册级封面，完全依靠字号对比和气场留白) */
        .layout-7 #block-logo { bottom: 4rem; left: 50%; transform: translateX(-50%); }
        .layout-7 #block-title { top: 6rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: center; gap: 1.75rem; }
        .layout-7 .title-main { writing-mode: horizontal-tb; font-size: 2.45rem; letter-spacing: 0.38em; text-align: center; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-7 .title-main #title-part2 { margin-top: 0; }
        .layout-7 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .layout-7 #block-body { top: 19.5rem; left: 50%; transform: translateX(-50%); width: 75%; }
        .layout-7 .body-content { text-align: center; writing-mode: horizontal-tb; line-height: 2; }
        .layout-7 .scrim-title { top: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to bottom, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 50%, var(--scrim-color-transparent) 100%); }
        .layout-7 .scrim-body { bottom: 0; left: 0; width: 100%; height: 55%; background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 50%, var(--scrim-color-transparent) 100%); }
        /* 创办年份印记 */
        .layout-7 #decor-elements { top: 3.5rem; left: 50%; transform: translateX(-50%); }
        .layout-7 #decor-elements .decor-badge { font-family: 'Cormorant Garamond', serif; font-size: 0.72rem; letter-spacing: 0.55em; opacity: 0.55; font-weight: 600; }


        /* ⚡️ 无 Logo 自适应留白算法 */
        .brand-none #block-logo { display: none !important; }
        .layout-2.brand-none #block-body { top: 6.5rem; }
        .layout-6.brand-none #block-title { top: 4rem; }
        .layout-7.brand-none #block-body { top: 21.5rem; }

        /* ---------------------------------
           ⚡️ 专属 9:16 画册级自适应精调
           ---------------------------------*/
        .ratio-9-16 .title-main {
            font-size: 2.1rem !important; 
        }
        
        /* 1. 经典极简 */
        .ratio-9-16.layout-1 #block-logo { top: 5rem; left: 3.5rem; }
        .ratio-9-16.layout-1 #block-title { top: 5rem; right: 3.5rem; height: 54%; }
        .ratio-9-16.layout-1 #block-body { bottom: 5rem; left: 3.5rem; width: 68%; }
        .ratio-9-16.layout-1 .scrim-title { width: 85%; height: 75%; }
        .ratio-9-16.layout-1 .scrim-body { width: 90%; height: 55%; }
        .ratio-9-16.layout-1 #decor-elements { top: 5rem; right: 10rem; }

        /* 2. 电影中轴 */
        .ratio-9-16.layout-2 #block-logo { top: 5rem; }
        .ratio-9-16.layout-2 #block-body { top: 12.5rem; width: 82%; } 
        .ratio-9-16.layout-2 #block-title { bottom: 5rem; }
        .ratio-9-16.layout-2 .title-main { font-size: 1.85rem !important; }
        .ratio-9-16.layout-2 .scrim-title { height: 45%; }
        .ratio-9-16.layout-2 .scrim-body { height: 45%; }

        /* 3. 现代画册 */
        .ratio-9-16.layout-3 #block-logo { top: 5rem; left: 3.5rem; bottom: auto; } 
        .ratio-9-16.layout-3 #block-title { top: 10.5rem; left: 3.5rem; }
        .ratio-9-16.layout-3 #block-body { bottom: 5rem; right: 3.5rem; width: 72%; }
        .ratio-9-16.layout-3 .title-main { font-size: 2.15rem !important; }
        .ratio-9-16.layout-3 #decor-elements { bottom: 5rem; left: 3.5rem; }

        /* 4. 先锋解构 */
        .ratio-9-16.layout-4 #block-logo { top: 5rem; right: 3.5rem; }
        .ratio-9-16.layout-4 #block-title { bottom: 5rem; right: 3.5rem; }
        .ratio-9-16.layout-4 #block-body { top: 10rem; left: 3.5rem; height: 42%; } 
        .ratio-9-16.layout-4 .title-main { font-size: 2.15rem !important; }
        .ratio-9-16.layout-4 #decor-elements { top: 10rem; right: 3.5rem; }

        /* 5. 美术馆展签 */
        .ratio-9-16.layout-5 #block-logo { top: 5rem; right: 3.5rem; }
        .ratio-9-16.layout-5 #block-title { bottom: 14rem; left: 3.5rem; }
        .ratio-9-16.layout-5 #block-body { bottom: 5rem; left: 3.5rem; width: 78%; }
        .ratio-9-16.layout-5 .title-main { font-size: 1.95rem !important; }
        .ratio-9-16.layout-5 #decor-elements { bottom: 5rem; right: 3.5rem; }

        /* 6. 无界视界 */
        .ratio-9-16.layout-6 #block-logo { top: 5rem; left: 3.5rem; }
        .ratio-9-16.layout-6 #block-title { top: 10rem; left: 3.5rem; right: 3.5rem; }
        .ratio-9-16.layout-6 #block-body { bottom: 5rem; left: 3.5rem; right: 3.5rem; }
        .ratio-9-16.layout-6 .body-content { flex-direction: column; gap: 0.9rem; } 
        .ratio-9-16.layout-6 #body-text1 { width: 100% !important; }
        .ratio-9-16.layout-6 #body-text2 { width: 100% !important; margin-top: 0.25rem !important; }
        .ratio-9-16.layout-6 .title-main { font-size: 2.15rem !important; }
        .ratio-9-16.layout-6 #decor-elements { top: 5rem; right: 3.5rem; }

        /* 7. 独立宣言 */
        .ratio-9-16.layout-7 #decor-elements { top: 4.5rem; }

    <!-- 脚本逻辑 -->
    <script>
        let currentBrand = 'miller';

        function setBrand(brand) {
            currentBrand = brand;
            renderBrand();
            
            const btnMiller = document.getElementById('brand-btn-miller');
            const btnYulan = document.getElementById('brand-btn-yulan');
            const btnNone = document.getElementById('brand-btn-none');
            const container = document.getElementById('poster-capture-area');

            container.classList.remove('brand-miller', 'brand-yulan', 'brand-none');
            container.classList.add(`brand-${brand}`);

            [btnMiller, btnYulan, btnNone].forEach(btn => {
                btn.classList.add('text-[#5e544e]');
                btn.classList.remove('bg-[#26211e]', 'text-white');
            });

            if (brand === 'miller') {
                btnMiller.classList.add('bg-[#26211e]', 'text-white');
                btnMiller.classList.remove('text-[#5e544e]');
            } else if (brand === 'yulan') {
                btnYulan.classList.add('bg-[#26211e]', 'text-white');
                btnYulan.classList.remove('text-[#5e544e]');
            } else {
                btnNone.classList.add('bg-[#26211e]', 'text-white');
                btnNone.classList.remove('text-[#5e544e]');
            }
        }

        // 重新渲染高精度的 Logo
        function renderBrand() {
            const logoContainer = document.getElementById('block-logo');
            if (currentBrand === 'none') {
                logoContainer.innerHTML = '';
            } else if (currentBrand === 'miller') {
                logoContainer.innerHTML = `
                    <div id="brand-logo" class="flex flex-col items-start leading-none tracking-widest transition-all duration-800">
                        <span class="font-eng font-bold text-[13px] md:text-[14px] text-primary select-none uppercase" style="letter-spacing: 0.32em;">MILLER PAINT</span>
                        <span class="font-eng font-light text-[7px] md:text-[7.5px] text-secondary mt-1 select-none uppercase tracking-[0.45em]">Established 1890</span>
                    </div>
                `;
            } else {
                logoContainer.innerHTML = `
                    <div id="brand-logo" class="flex flex-col items-start leading-none tracking-[0.38em] transition-all duration-800">
                        <span class="font-eng text-primary font-bold text-[14px] md:text-[15px] select-none">YULAN HOME</span>
                        <span class="font-eng text-secondary text-[7px] tracking-[0.42em] mt-1 select-none">DESIGN STUDIO</span>
                    </div>
                `;
            }
            const initialImg = document.getElementById('poster-bg');
            adjustTextColor(initialImg);
        }

        // 智能色彩亮度与原图保持算法
        function calculateBrightness(imageElement) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 100; 
            const ratio = imageElement.naturalHeight / imageElement.naturalWidth;
            canvas.height = ratio ? canvas.width * ratio : 100;
            
            try {
                context.drawImage(imageElement, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let colorSum = 0;
                for (let x = 0; x < data.length; x += 4) {
                    colorSum += Math.sqrt(0.299 * (data[x] * data[x]) + 0.587 * (data[x + 1] * data[x + 1]) + 0.114 * (data[x + 2] * data[x + 2]));
                }
                const avgBrightness = Math.floor(colorSum / (data.length / 4));
                return avgBrightness > 140 ? 'light' : 'dark'; 
            } catch (e) {
                return 'light'; 
            }
        }

        // 精控无色偏黑白配方，文字色彩智能对撞，背景绝不染色
        function adjustTextColor(imgElement) {
            const mode = calculateBrightness(imgElement);
            const root = document.documentElement;
            if (mode === 'dark') {
                root.style.setProperty('--text-primary-color', '#ffffff');
                root.style.setProperty('--text-secondary-color', '#e2dcd5');
                root.style.setProperty('--text-tertiary-color', 'rgba(255, 255, 255, 0.45)');
                root.style.setProperty('--container-bg', '#141211');
                
                /* 使用纯色相 neutral 黑色（rgba(0,0,0)）渐变，保护任何冷暖调底图不发生色相畸变 */
                root.style.setProperty('--scrim-color-strong', 'rgba(0, 0, 0, 0.72)');
                root.style.setProperty('--scrim-color-soft', 'rgba(0, 0, 0, 0.32)');
                root.style.setProperty('--scrim-color-transparent', 'rgba(0, 0, 0, 0)');
                root.style.setProperty('--text-shadow-subtle', '0 1px 3px rgba(0, 0, 0, 0.5)');
            } else {
                root.style.setProperty('--text-primary-color', '#26211e');
                root.style.setProperty('--text-secondary-color', '#615751');
                root.style.setProperty('--text-tertiary-color', 'rgba(38, 33, 30, 0.45)');
                root.style.setProperty('--container-bg', '#f2ece7');
                
                /* 使用纯色相 neutral 白色（rgba(255,255,255)）渐变，杜绝色偏 */
                root.style.setProperty('--scrim-color-strong', 'rgba(255, 255, 255, 0.78)');
                root.style.setProperty('--scrim-color-soft', 'rgba(255, 255, 255, 0.32)');
                root.style.setProperty('--scrim-color-transparent', 'rgba(255, 255, 255, 0)');
                root.style.setProperty('--text-shadow-subtle', '0 1px 2px rgba(255, 255, 255, 0.4)');
            }
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('poster-bg');
                    imgElement.removeAttribute('crossorigin');
                    imgElement.onload = function() { adjustTextColor(imgElement); };
                    imgElement.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function togglePanelPosition() {
            const body = document.body;
            if (body.classList.contains('panel-left')) {
                body.classList.remove('panel-left');
                body.classList.add('panel-right');
            } else {
                body.classList.remove('panel-right');
                body.classList.add('panel-left');
            }
        }

        function setRatio(ratio) {
            const wrapper = document.getElementById('poster-wrapper');
            const btn34 = document.getElementById('ratio-btn-3-4');
            const btn916 = document.getElementById('ratio-btn-9-16');

            if (ratio === '3-4') {
                wrapper.classList.remove('ratio-9-16');
                wrapper.classList.add('ratio-3-4');
                btn34.classList.add('bg-[#26211e]', 'text-white');
                btn34.classList.remove('text-[#5e544e]');
                btn916.classList.remove('bg-[#26211e]', 'text-white');
                btn916.classList.add('text-[#5e544e]');
            } else {
                wrapper.classList.remove('ratio-3-4');
                wrapper.classList.add('ratio-9-16');
                btn916.classList.add('bg-[#26211e]', 'text-white');
                btn916.classList.remove('text-[#5e544e]');
                btn34.classList.remove('bg-[#26211e]', 'text-white');
                btn34.classList.add('text-[#5e544e]');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderBrand();
        });

        // 模态框逻辑
        const modal = document.getElementById('text-modal');
        const modalContent = document.getElementById('text-modal-content');

        function openModal() {
            modal.classList.remove('hidden');
            const smartPaste = document.getElementById('input-smart-paste');
            if(smartPaste) smartPaste.value = '';

            document.getElementById('input-title1').value = document.getElementById('title-part1').innerText;
            document.getElementById('input-title2').value = document.getElementById('title-part2').innerText;
            document.getElementById('input-sub-eng').value = document.getElementById('subtitle-eng').innerText;
            document.getElementById('input-sub-cn').value = document.getElementById('subtitle-cn').innerText;
            
            const parseHtmlToText = (html) => html.replace(/<br\s*[\/]?>/gi, '\n').split('\n').map(line => line.trim()).join('\n');
            document.getElementById('input-body1').value = parseHtmlToText(document.getElementById('body-text1').innerHTML);
            document.getElementById('input-body2').value = parseHtmlToText(document.getElementById('body-text2').innerHTML);

            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function applyText() {
            document.getElementById('title-part1').innerText = document.getElementById('input-title1').value;
            document.getElementById('title-part2').innerText = document.getElementById('input-title2').value;
            document.getElementById('subtitle-eng').innerText = document.getElementById('input-sub-eng').value;
            document.getElementById('subtitle-cn').innerText = document.getElementById('input-sub-cn').value;
            
            document.getElementById('body-text1').innerHTML = document.getElementById('input-body1').value.replace(/\n/g, '<br>');
            document.getElementById('body-text2').innerHTML = document.getElementById('input-body2').value.replace(/\n/g, '<br>');

            closeModal();
        }

        // 极速智能解析算法
        function autoParseText(event) {
            const rawText = document.getElementById('input-smart-paste').value;
            if (!rawText.trim()) return;

            const extract = (regex) => { const match = rawText.match(regex); return match ? match[1].trim() : null; };
            const title = extract(/(?:主标题|标题)[：:]\s*([^\n]+)/);
            const subTitle = extract(/(?:副标题)[：:]\s*([^\n]+)/);
            const bodyMatch = rawText.match(/(?:正文|文案)[：:]\s*([\s\S]+)/);
            const body = bodyMatch ? bodyMatch[1].trim() : null;

            if (title) {
                const parts = title.split(/[,，]/);
                if (parts.length > 1) {
                    const lastPart = parts.pop().trim();
                    document.getElementById('input-title1').value = parts.join('，') + '，';
                    document.getElementById('input-title2').value = lastPart;
                } else {
                    if (title.length > 6) {
                        document.getElementById('input-title1').value = title.slice(0, -4);
                        document.getElementById('input-title2').value = title.slice(-4);
                    } else {
                        document.getElementById('input-title1').value = title;
                        document.getElementById('input-title2').value = "";
                    }
                }
            }
            if (subTitle) {
                const parts = subTitle.split(/[·\-\|]/);
                if (parts.length > 1) {
                    document.getElementById('input-sub-eng').value = parts[0].trim();
                    document.getElementById('input-sub-cn').value = parts.slice(1).join('·').trim();
                } else {
                    const engMatch = subTitle.match(/^[a-zA-Z\s&]+/);
                    if (engMatch && engMatch[0].trim().length > 0) {
                        document.getElementById('input-sub-eng').value = engMatch[0].trim();
                        document.getElementById('input-sub-cn').value = subTitle.substring(engMatch[0].length).trim();
                    } else {
                        document.getElementById('input-sub-eng').value = "";
                        document.getElementById('input-sub-cn').value = subTitle;
                    }
                }
            }
            if (body) {
                const paras = body.split(/\n\s*\n/);
                if (paras.length > 1) {
                    document.getElementById('input-body1').value = paras[0].trim();
                    document.getElementById('input-body2').value = paras.slice(1).join('\n\n').trim();
                } else {
                    const lines = body.split('\n').filter(l => l.trim() !== '');
                    if (lines.length > 1) {
                        document.getElementById('input-body1').value = lines[0].trim();
                        document.getElementById('input-body2').value = lines.slice(1).join('\n').trim();
                    } else {
                        document.getElementById('input-body1').value = body;
                        document.getElementById('input-body2').value = "";
                    }
                }
            }

            const btn = event.currentTarget;
            const oldText = btn.innerText;
            btn.innerText = "✅ 识别并一键拆分成功";
            btn.classList.add("!bg-emerald-700", "!text-white"); 
            setTimeout(() => { btn.innerText = oldText; btn.classList.remove("!bg-emerald-700", "!text-white"); }, 2000);
        }

        // 7 种排版切换
        const layoutNames = ["经典极简", "电影中轴", "现代画册", "先锋解构", "美术馆展签", "无界视界", "独立宣言"];
        let currentLayoutIndex = 0;

        function toggleLayout(event) {
            const container = document.getElementById('poster-capture-area');
            const btnTextSpan = document.getElementById('layout-btn-text');
            const decorContainer = document.getElementById('decor-elements');
            
            container.classList.remove(`layout-${currentLayoutIndex + 1}`);
            
            currentLayoutIndex = (currentLayoutIndex + 1) % layoutNames.length;
            
            container.classList.add(`layout-${currentLayoutIndex + 1}`);
            btnTextSpan.innerText = layoutNames[currentLayoutIndex];

            // 动态控制微缩定位符，强化杂志完成度
            if (currentLayoutIndex === 0) {
                decorContainer.innerHTML = `<span class="decor-badge">Vol. 08</span><span class="decor-badge hidden md:inline">Issue 102</span>`;
            } else if (currentLayoutIndex === 1) {
                decorContainer.innerHTML = `<span class="decor-badge">— ALL RIGHTS RESERVED. —</span>`;
            } else if (currentLayoutIndex === 2) {
                decorContainer.innerHTML = `<span class="decor-badge">EDITION NO. 01</span><span class="decor-badge">MUSEUM ARCHIVE</span>`;
            } else if (currentLayoutIndex === 3) {
                decorContainer.innerHTML = `<span class="decor-badge">[ DECONSTRUCTION ]</span>`;
            } else if (currentLayoutIndex === 4) {
                decorContainer.innerHTML = `<span class="decor-badge">No. 403-1</span><span class="decor-badge">50 x 70 cm</span>`;
            } else if (currentLayoutIndex === 5) {
                decorContainer.innerHTML = `<span class="decor-badge">EDITORIAL 2026</span>`;
            } else if (currentLayoutIndex === 6) {
                decorContainer.innerHTML = `<span class="decor-badge">EST. 1890</span>`;
            }
        }

        // 超清印刷级海报下载
        function downloadPoster() {
            const captureArea = document.getElementById('poster-capture-area');
            const btnText = document.getElementById('download-btn-text');
            const originalText = btnText.innerText;

            btnText.innerText = "超清极致导出中...";
            captureArea.classList.add('is-exporting');
            
            const isDark = document.documentElement.style.getPropertyValue('--text-primary-color') === 'rgb(250, 247, 245)' || 
                           document.documentElement.style.getPropertyValue('--text-primary-color') === '#ffffff' ||
                           document.documentElement.style.getPropertyValue('--text-primary-color') === '#faf7f5';
            const themeBgColor = isDark ? '#141211' : '#f2ece7';

            document.fonts.ready.then(() => {
                setTimeout(() => {
                    html2canvas(captureArea, {
                        scale: 4.5,            // 极致采样率，完美实现4K视网膜精度
                        useCORS: true,
                        allowTaint: false,
                        logging: false,
                        imageTimeout: 0,
                        width: captureArea.clientWidth,
                        height: captureArea.clientHeight,
                        backgroundColor: themeBgColor
                    }).then(canvas => {
                        captureArea.classList.remove('is-exporting');

                        const imgData = canvas.toDataURL('image/jpeg', 0.98);
                        const link = document.createElement('a');
                        link.href = imgData;
                        link.download = `Poster_${layoutNames[currentLayoutIndex]}_4K_Ultra.jpg`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        
                        btnText.innerText = originalText;
                    }).catch(err => {
                        console.error("海报生成失败:", err);
                        captureArea.classList.remove('is-exporting');
                        btnText.innerText = originalText;
                    });
                }, 200);
            });
        }
    </script>
