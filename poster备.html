<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sculptural Spaces 杂志级海报 - 大师版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入高级衬线字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+SC:wght@200;300;400;500;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-scale: 1.0;
            --scrim-intensity: 0.3; /* 默认背景遮罩强度（30%），更加清透 */
            --img-offset-x: 50%;
            --img-offset-y: 50%;
            --text-primary-color: #26211e;
            --text-secondary-color: #615751;
            --text-tertiary-color: rgba(38, 33, 30, 0.42);
            --container-bg: #f2ece7;
            
            /* 采用中性无色相渐变（纯白到绝对透明），保护底色纯粹，确保文字高亮可读 */
            --scrim-color-strong: rgba(255, 255, 255, 0.82); 
            --scrim-color-soft: rgba(255, 255, 255, 0.35);   
            --scrim-color-transparent: rgba(255, 255, 255, 0); 
            
            /* 极轻柔的暖褐色纸质微凹投影 (Paper Press Depth) */
            --text-shadow-subtle: 0 1px 2px rgba(38, 33, 30, 0.12), 0 3px 8px rgba(38, 33, 30, 0.04); 
            
            /* 专为超精细Logo定制的微凸高光隔离阴影 */
            --logo-text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9), 0 0 1px rgba(38, 33, 30, 0.15);
            --logo-filter: grayscale(1) brightness(0.12) contrast(1.25) opacity(0.9);
        }

        body {
            background-color: #dfdad5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            gap: 1.5rem;
            font-family: 'Noto Serif SC', serif;
        }

        /* 桌面端布局固定自适应：左控制台，右海报 */
        @media (min-width: 1024px) {
            body {
                flex-direction: row;
                gap: 4rem;
                padding: 2rem;
            }
        }
        
        /* 智能响应式海报容器外包装 */
        .poster-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 1.25rem;
            box-shadow: 0 45px 90px -25px rgba(43, 37, 33, 0.28), 0 25px 45px -18px rgba(43, 37, 33, 0.15);
            transition: aspect-ratio 0.8s cubic-bezier(0.16, 1, 0.3, 1), height 0.8s cubic-bezier(0.16, 1, 0.3, 1), max-width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 3:4 比例状态 */
        .poster-wrapper.ratio-3-4 {
            aspect-ratio: 3 / 4;
            height: 78vh;
            max-width: calc(78vh * 3 / 4);
        }

        /* 9:16 比例状态 */
        .poster-wrapper.ratio-9-16 {
            aspect-ratio: 9 / 16;
            height: 82vh;
            max-width: calc(82vh * 9 / 16);
        }

        /* 移动端特殊适配 */
        @media (max-width: 1023px) {
            .poster-wrapper.ratio-3-4 {
                height: auto;
                aspect-ratio: 3 / 4;
                max-width: 440px;
            }
            .poster-wrapper.ratio-9-16 {
                height: auto;
                aspect-ratio: 9 / 16;
                max-width: 380px;
            }
        }

        /* 纯净截图区域 */
        .poster-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: var(--container-bg, #f2ece7);
            overflow: hidden;
            user-select: none;
        }

        /* 背景图片：支持精确的物理位移，高度裁切防变形布局 */
        .bg-image {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; 
            object-position: var(--img-offset-x, 50%) var(--img-offset-y, 50%) !important;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            filter: none !important;
            transition: transform 3s cubic-bezier(0.16, 1, 0.3, 1);
            
            /* 极限制止画面渲染模糊 */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* 鼠标悬停时激活呼吸感微缩放效果 */
        .poster-container:hover .bg-image {
            transform: scale(1.04) translateZ(0);
        }

        /* ⚡️ 导出防护锁 */
        .is-exporting .bg-image {
            transform: none !important;
            transition: none !important;
        }

        .font-eng { font-family: 'Cormorant Garamond', serif; }
        
        .text-primary {
            color: var(--text-primary-color);
            text-shadow: var(--text-shadow-subtle);
            transition: color 0.8s ease, text-shadow 0.8s ease;
        }
        .text-secondary {
            color: var(--text-secondary-color);
            text-shadow: var(--text-shadow-subtle);
            transition: color 0.8s ease, text-shadow 0.8s ease;
        }
        .text-tertiary {
            color: var(--text-tertiary-color);
            transition: color 0.8s ease;
        }
        
        /* 💎 超高清 Logo 次像素渲染微调，确保极精细可见 */
        #brand-logo {
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #brand-logo span {
            text-shadow: var(--logo-text-shadow);
        }

        /* 品牌 Logo 容器定位 */
        #block-logo {
            position: absolute;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 25;
        }
        
        /* 排版系统样式 */
        #block-title, #block-body, #decor-elements {
            position: absolute;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 15;
        }
        
        /* 强制所有渐变遮罩为 100% 全画幅图层，采用全局遮罩强度变量控制透明度 */
        .scrim-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 5;
            opacity: var(--scrim-intensity, 0.3); 
        }
        
        /* ---------------------------------
           🎯 极限制重与全局缩放文字重合适配
           ---------------------------------*/
        .title-main {
            font-family: 'Noto Serif SC', serif;
        }
        .title-main span {
            display: block;
            white-space: normal; /* 允许长文字优雅地自然换行 */
            word-break: break-all;
        }
        /* “阅尽繁华，归于” 设定为轻灵、纤细的宋体（Weight 200） */
        #title-part1 {
            font-weight: 200 !important;
        }
        /* “一壁静谧” 采用极富雕刻质感的重黑宋体（Weight 900） */
        #title-part2 {
            font-weight: 900 !important;
        }

        /* 强制覆盖字号以全面配合全局滑块变量 */
        #subtitle-eng {
            font-size: calc(11px * var(--text-scale, 1)) !important;
        }
        #subtitle-cn {
            font-size: calc(11px * var(--text-scale, 1)) !important;
        }
        #body-text1 {
            font-size: calc(14.5px * var(--text-scale, 1)) !important;
        }
        #body-text2 {
            font-size: calc(12.5px * var(--text-scale, 1)) !important;
        }
        .decor-badge {
            font-size: calc(11.5px * var(--text-scale, 1)) !important;
        }

        /* ---------------------------------
           💎 极简画布内“所见即所得”实时编辑样式（Inline Text Editing Feedback）
           ---------------------------------*/
        [contenteditable="true"] {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 4px;
            padding: 2px 4px;
            margin: -2px -4px;
        }
        [contenteditable="true"]:hover {
            background-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 1px rgba(38, 33, 30, 0.15);
            cursor: text;
        }
        [contenteditable="true"]:focus {
            background-color: rgba(255, 255, 255, 0.22);
            box-shadow: 0 0 0 1.5px var(--text-primary-color), 0 8px 24px -8px rgba(38, 33, 30, 0.12);
            outline: none;
            cursor: text;
        }
        /* 空白文字占位符 */
        [contenteditable="true"]:empty:before {
            content: attr(placeholder);
            color: var(--text-tertiary-color);
            opacity: 0.45;
        }
        
        /* ---------------------------------
           🌟 10 大全新极极简无横线布局系统
           ---------------------------------*/
        
        /* 布局 1：经典极简 */
        .layout-1 #block-logo { top: 3.5rem; left: 3rem; transform: none; }
        .layout-1 #block-title { top: 3.5rem; right: 3rem; height: 60%; display: flex; gap: 2.25rem; align-items: flex-start; }
        .layout-1 .title-main { writing-mode: vertical-rl; font-size: calc(2.45rem * var(--text-scale, 1)); letter-spacing: 0.48em; line-height: 1.55; }
        .layout-1 .title-main #title-part2 { margin-top: calc(4.5rem * var(--text-scale, 1)); }
        .layout-1 .title-sub-group { writing-mode: vertical-rl; display: flex; flex-direction: column; align-items: center; gap: 1.75rem; margin-top: calc(1.5rem * var(--text-scale, 1)); }
        
        /* Layout 1 英文或数字纵排时，执行优雅的90度旋转 */
        .layout-1 #subtitle-eng {
            writing-mode: horizontal-tb !important;
            display: inline-block;
            transform: rotate(90deg);
            transform-origin: center center;
            white-space: nowrap;
            margin: calc(3.2rem * var(--text-scale, 1)) calc(-2.5rem * var(--text-scale, 1)) !important; 
        }
        
        /* 💎 针对英文副标题检测到实际输入中文时，自动拦截并切换为不旋转的直立竖排状态 */
        .layout-1 #subtitle-eng.is-chinese-sub {
            writing-mode: vertical-rl !important;
            transform: none !important;
            margin: 0 !important;
            display: block !important;
            white-space: nowrap !important;
            letter-spacing: 0.35em !important;
        }

        .layout-1 #block-body { bottom: 3.5rem; left: 3rem; width: 62%; }
        .layout-1 .body-content { text-align: justify; writing-mode: horizontal-tb; line-height: 1.95; }
        .layout-1 .scrim-title { background: radial-gradient(circle at top right, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-1 .scrim-body { background: radial-gradient(circle at bottom left, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-1 #decor-elements { display: none !important; }

        /* 布局 2：电影中轴 */
        .layout-2 #block-logo { top: 4rem; left: 50%; transform: translateX(-50%); }
        .layout-2 #block-title { bottom: 4.5rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: center; gap: 1.75rem; }
        .layout-2 .title-main { writing-mode: horizontal-tb; font-size: calc(2.15rem * var(--text-scale, 1)); letter-spacing: 0.38em; text-align: center; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-2 .title-main #title-part2 { margin-top: 0; } 
        .layout-2 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .layout-2 #block-body { top: 9.5rem; left: 50%; transform: translateX(-50%); width: 75%; } 
        .layout-2 .body-content { text-align: center; writing-mode: horizontal-tb; line-height: 2; }
        
        .layout-2 .scrim-title { background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 30%, var(--scrim-color-transparent) 60%); }
        .layout-2 .scrim-body { background: linear-gradient(to bottom, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 25%, var(--scrim-color-transparent) 55%); }
        .layout-2 #decor-elements { bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; justify-content: center; width: 100%; }

        /* 布局 3：现代画册 */
        .layout-3 #block-logo { bottom: 4rem; left: 3rem; transform: none; }
        .layout-3 #block-title { top: 4rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 1.5rem; }
        .layout-3 .title-main { writing-mode: horizontal-tb; font-size: calc(2.45rem * var(--text-scale, 1)); letter-spacing: 0.28em; text-align: left; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-3 .title-main #title-part2 { margin-top: 0; }
        .layout-3 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row; align-items: center; gap: 1.2rem; }
        .layout-3 #block-body { bottom: 4rem; right: 3rem; width: 56%; transform: translateX(0); }
        .layout-3 .body-content { text-align: right; writing-mode: horizontal-tb; line-height: 2.05; }
        .layout-3 .scrim-title { background: radial-gradient(circle at top left, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-3 .scrim-body { background: radial-gradient(circle at bottom right, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-3 #decor-elements { bottom: 6.5rem; left: 3rem; display: flex; flex-direction: column; align-items: flex-start; gap: 0.2rem; }

        /* 布局 4：先锋解构 */
        .layout-4 #block-logo { top: 4rem; right: 3rem; transform: none; }
        .layout-4 #block-title { bottom: 4rem; right: 3rem; left: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 1.5rem; }
        .layout-4 .title-main { writing-mode: horizontal-tb; font-size: calc(2.35rem * var(--text-scale, 1)); letter-spacing: 0.28em; text-align: right; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-4 .title-main #title-part2 { margin-top: 0; }
        .layout-4 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row-reverse; align-items: center; gap: 1.2rem; }
        .layout-4 #block-body { top: 4rem; left: 3rem; width: auto; height: 50%; transform: translateX(0); }
        .layout-4 .body-content { text-align: left; writing-mode: vertical-rl; display: flex; flex-direction: row-reverse; justify-content: flex-start; gap: 1.5rem; line-height: 2.25; }
        .layout-4 .scrim-title { background: radial-gradient(circle at bottom right, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-4 .scrim-body { background: radial-gradient(circle at top left, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-4 #decor-elements { top: 7.5rem; right: 3rem; display: flex; flex-direction: column; align-items: flex-end; }

        /* 布局 5：美术馆展签 */
        .layout-5 #block-logo { top: 4rem; right: 3rem; transform: none; }
        .layout-5 #block-title { bottom: 11.5rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 1.25rem; }
        .layout-5 .title-main { writing-mode: horizontal-tb; font-size: calc(2.25rem * var(--text-scale, 1)); letter-spacing: 0.22em; text-align: left; display: flex; flex-direction: column; gap: 0.6rem; }
        .layout-5 .title-main #title-part2 { margin-top: 0; }
        .layout-5 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row; align-items: center; gap: 1.2rem; }
        .layout-5 #block-body { bottom: 3rem; left: 3rem; width: 72%; transform: translateX(0); }
        .layout-5 .body-content { text-align: justify; writing-mode: horizontal-tb; line-height: 1.9; }
        .layout-5 .scrim-title { background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-5 .scrim-body { opacity: 0; } 
        .layout-5 #decor-elements { bottom: 3rem; right: 3rem; display: flex; flex-direction: column; align-items: flex-end; }

        /* 布局 6：无界视界 */
        .layout-6 #block-logo { top: 4rem; left: 3rem; transform: none; }
        .layout-6 #block-title { top: 7.5rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 1.25rem; }
        
        /* 💎 Layout 6 标题修改为垂直 flex 纵流，100% 杜绝窄屏下的水平折行杂乱 */
        .layout-6 .title-main { 
            writing-mode: horizontal-tb; 
            font-size: calc(2.55rem * var(--text-scale, 1)); 
            letter-spacing: 0.28em; 
            text-align: left; 
            display: flex; 
            flex-direction: column; 
            gap: 0.5rem; 
        }
        .layout-6 .title-main #title-part2 { margin-top: 0; }
        .layout-6 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row; align-items: center; gap: 1.25rem; }
        .layout-6 #block-body { bottom: 4rem; left: 3rem; right: 3rem; width: auto; transform: none; }
        .layout-6 .body-content { display: flex; flex-direction: row; justify-content: space-between; gap: 2.5rem; text-align: left; writing-mode: horizontal-tb; line-height: 1.95; }
        .layout-6 #body-text1 { width: 48%; }
        .layout-6 #body-text2 { width: 48%; margin-top: 0 !important; }
        
        .layout-6 .scrim-title { background: linear-gradient(to bottom, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 35%, var(--scrim-color-transparent) 70%); }
        .layout-6 .scrim-body { background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 35%, var(--scrim-color-transparent) 70%); }
        .layout-6 #decor-elements { top: 4rem; right: 3rem; display: flex; align-items: center; gap: 0.5rem; }

        /* 布局 7：独立宣言 */
        .layout-7 #block-logo { bottom: 4rem; left: 50%; transform: translateX(-50%); }
        .layout-7 #block-title { top: 6rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: center; gap: 1.75rem; }
        .layout-7 .title-main { writing-mode: horizontal-tb; font-size: calc(2.45rem * var(--text-scale, 1)); letter-spacing: 0.38em; text-align: center; display: flex; flex-direction: column; gap: 0.75rem; }
        .layout-7 .title-main #title-part2 { margin-top: 0; }
        .layout-7 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        
        /* 💎 极致避撞重构：将 Layout 7 正文段由固定 top 变更为 bottom 底部对齐，实现双端呼吸气场 */
        .layout-7 #block-body { bottom: 7.5rem; left: 50%; transform: translateX(-50%); width: 75%; }
        .layout-7 .body-content { text-align: center; writing-mode: horizontal-tb; line-height: 2; }
        
        .layout-7 .scrim-title { background: linear-gradient(to bottom, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 30%, var(--scrim-color-transparent) 65%); }
        .layout-7 .scrim-body { background: linear-gradient(to top, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 30%, var(--scrim-color-transparent) 65%); }
        .layout-7 #decor-elements { top: 3.5rem; left: 50%; transform: translateX(-50%); }

        /* 布局 8：诗性留白 (Poetic Silence) */
        .layout-8 #block-logo { top: 3.5rem; left: 3rem; transform: none; }
        .layout-8 #block-title { top: 7.5rem; left: 3rem; height: 60%; display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start; gap: 1.5rem; }
        .layout-8 .title-main { writing-mode: vertical-rl; font-size: calc(2.35rem * var(--text-scale, 1)); letter-spacing: 0.55em; line-height: 1.5; }
        .layout-8 .title-main #title-part2 { margin-top: calc(4.5rem * var(--text-scale, 1)); }
        .layout-8 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: column; align-items: flex-start; gap: 0.6rem; }
        .layout-8 #block-body { bottom: 3.5rem; right: 3rem; width: 48%; }
        .layout-8 .body-content { text-align: left; writing-mode: horizontal-tb; line-height: 1.95; }
        .layout-8 .scrim-title { background: radial-gradient(circle at top left, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-8 .scrim-body { background: radial-gradient(circle at bottom right, var(--scrim-color-strong) 0%, var(--scrim-color-soft) 40%, var(--scrim-color-transparent) 80%); }
        .layout-8 #decor-elements { bottom: 3.5rem; left: 3rem; display: flex; flex-direction: column; align-items: flex-start; }

        /* 布局 9：极客包豪斯 (Bauhaus Structural Grid) - 重构防冲突对齐 */
        .layout-9 #block-logo { top: 3.5rem; right: 3rem; transform: none; }
        .layout-9 #block-title { top: 3.5rem; left: 3rem; right: 3rem; height: auto; display: flex; flex-direction: column; align-items: flex-start; gap: 1.25rem; }
        .layout-9 .title-main { writing-mode: horizontal-tb; font-size: calc(2.5rem * var(--text-scale, 1)); letter-spacing: 0.28em; display: flex; flex-direction: column; gap: 0.5rem; }
        .layout-9 .title-main #title-part2 { margin-top: 0; }
        /* 移除横条实线分割，采用气场留白 */
        .layout-9 .title-sub-group { writing-mode: horizontal-tb; display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 1.5rem; max-width: 100%; margin-top: 0.5rem; opacity: 0.85; }
        .layout-9 #block-body { bottom: 4rem; right: 3rem; width: 50%; }
        .layout-9 .body-content { text-align: left; writing-mode: horizontal-tb; line-height: 2.05; }

    <!-- 脚本逻辑 -->
    <script>
        let currentBrand = 'miller';
        let textColorOverride = 'auto'; // 'auto', 'white', 'dark'

        function setBrand(brand) {
            currentBrand = brand;
            renderBrand();
            
            const btnMiller = document.getElementById('brand-btn-miller');
            const btnYulan = document.getElementById('brand-btn-yulan');
            const btnNone = document.getElementById('brand-btn-none');
            const container = document.getElementById('poster-capture-area');

            container.classList.remove('brand-miller', 'brand-yulan', 'brand-none');
            container.classList.add(`brand-${brand}`);

            [btnMiller, btnYulan, btnNone].forEach(btn => {
                btn.classList.add('text-[#5e544e]');
                btn.classList.remove('bg-[#26211e]', 'text-white');
            });

            if (brand === 'miller') {
                btnMiller.classList.add('bg-[#26211e]', 'text-white');
                btnMiller.classList.remove('text-[#5e544e]');
            } else if (brand === 'yulan') {
                btnYulan.classList.add('bg-[#26211e]', 'text-white');
                btnYulan.classList.remove('text-[#5e544e]');
            } else {
                btnNone.classList.add('bg-[#26211e]', 'text-white');
                btnNone.classList.remove('text-[#5e544e]');
            }
        }

        // 重新渲染高精度的 Logo (融入全局文字缩放变量与次像素渲染抗锯齿)
        function renderBrand() {
            const logoContainer = document.getElementById('block-logo');
            if (currentBrand === 'none') {
                logoContainer.innerHTML = '';
            } else if (currentBrand === 'miller') {
                logoContainer.innerHTML = `
                    <div id="brand-logo" class="flex flex-col items-start leading-none tracking-widest transition-all duration-800">
                        <span class="font-eng font-bold text-primary select-none uppercase" style="font-size: calc(13px * var(--text-scale, 1)); letter-spacing: 0.32em; text-shadow: var(--logo-text-shadow);">MILLER PAINT</span>
                        <span class="font-eng font-light text-secondary mt-1 select-none uppercase" style="font-size: calc(7.5px * var(--text-scale, 1)); letter-spacing: 0.45em; text-shadow: var(--logo-text-shadow);">Established 1890</span>
                    </div>
                `;
            } else {
                logoContainer.innerHTML = `
                    <div id="brand-logo" class="flex flex-col items-start leading-none transition-all duration-800" style="letter-spacing: 0.38em;">
                        <span class="font-eng text-primary font-bold select-none" style="font-size: calc(14px * var(--text-scale, 1)); text-shadow: var(--logo-text-shadow);">YULAN HOME</span>
                        <span class="font-eng text-secondary mt-1 select-none" style="font-size: calc(7px * var(--text-scale, 1)); letter-spacing: 0.42em; text-shadow: var(--logo-text-shadow);">DESIGN STUDIO</span>
                    </div>
                `;
            }
            const initialImg = document.getElementById('poster-bg');
            adjustTextColor(initialImg);
        }

        // 整体文字比例缩放控制函数
        function updateTextScale(val) {
            document.getElementById('text-scale-value').innerText = Math.round(val * 100) + '%';
            // 将比例因子写入 HTML 根属性，无缝作用于所有 calc() 字体规则
            document.documentElement.style.setProperty('--text-scale', val);
            // 同步刷新Logo层内部文字尺寸
            renderBrand();
        }

        // 背景遮罩强度调节调节滑块
        function updateScrimIntensity(val) {
            document.getElementById('scrim-intensity-value').innerText = Math.round(val * 100) + '%';
            document.documentElement.style.setProperty('--scrim-intensity', val);
        }

        // 底图位移调节控制函数 (一阶段：1.1)
        function updateImageOffset(axis, val) {
            if (axis === 'x') {
                document.getElementById('offset-x-value').innerText = val + '%';
                document.documentElement.style.setProperty('--img-offset-x', val + '%');
            } else {
                document.getElementById('offset-y-value').innerText = val + '%';
                document.documentElement.style.setProperty('--img-offset-y', val + '%');
            }
        }

        // 主动字色覆盖设置函数 (一阶段：1.3)
        function setTextColorOverride(mode) {
            textColorOverride = mode;
            // 更新 UI 按钮激活状态
            ['btn-co-auto', 'btn-co-white', 'btn-co-dark'].forEach(id => {
                document.getElementById(id).classList.remove('bg-[#26211e]', 'text-white');
                document.getElementById(id).classList.add('text-[#5e544e]', 'hover:text-black');
            });
            document.getElementById(`btn-co-${mode}`).classList.add('bg-[#26211e]', 'text-white');
            document.getElementById(`btn-co-${mode}`).classList.remove('text-[#5e544e]', 'hover:text-black');
            
            adjustTextColor(document.getElementById('poster-bg'));
        }

        // 智能检测英文副标题是否包含中文字符，自动调整排版方向
        function checkSubtitleChinese() {
            const subtitleEng = document.getElementById('subtitle-eng');
            if (subtitleEng) {
                const text = subtitleEng.innerText || subtitleEng.textContent;
                // 利用正则精确匹配中文字符
                const hasChinese = /[\u4e00-\u9fa5]/.test(text);
                if (hasChinese) {
                    subtitleEng.classList.add('is-chinese-sub');
                } else {
                    subtitleEng.classList.remove('is-chinese-sub');
                }
            }
        }

        // 智能色彩亮度与原图保持算法
        function calculateBrightness(imageElement) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 100; 
            const ratio = imageElement.naturalHeight / imageElement.naturalWidth;
            canvas.height = ratio ? canvas.width * ratio : 100;
            
            try {
                context.drawImage(imageElement, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let colorSum = 0;
                for (let x = 0; x < data.length; x += 4) {
                    colorSum += Math.sqrt(0.299 * (data[x] * data[x]) + 0.587 * (data[x + 1] * data[x + 1]) + 0.114 * (data[x + 2] * data[x + 2]));
                }
                const avgBrightness = Math.floor(colorSum / (data.length / 4));
                return avgBrightness > 140 ? 'light' : 'dark'; 
            } catch (e) {
                return 'light'; 
            }
        }

        // 精控无色偏黑白配方：降低多余雾化遮罩，依靠纸墨微投影与极精细高对比度Logo投影
        function adjustTextColor(imgElement) {
            let mode = calculateBrightness(imgElement);
            const root = document.documentElement;

            // ⚡️ 如果用户指定了强制色彩覆盖，则优先执行覆盖逻辑 (一阶段：1.3)
            if (textColorOverride === 'white') {
                mode = 'dark'; // 模拟在黑色底图下触发白色文字配置
            } else if (textColorOverride === 'dark') {
                mode = 'light'; // 模拟在白色底图下触发深色文字配置
            }

            if (mode === 'dark') {
                root.style.setProperty('--text-primary-color', '#ffffff');
                root.style.setProperty('--text-secondary-color', '#e5dfd9');
                root.style.setProperty('--text-tertiary-color', 'rgba(255, 255, 255, 0.5)');
                root.style.setProperty('--container-bg', '#12100f');
                
                /* 大幅下调强黑色遮罩极限（降至0.45），完美还原原图暗部细节 */
                root.style.setProperty('--scrim-color-strong', 'rgba(0, 0, 0, 0.45)');
                root.style.setProperty('--scrim-color-soft', 'rgba(0, 0, 0, 0.15)');
                root.style.setProperty('--scrim-color-transparent', 'rgba(0, 0, 0, 0)');
                
                /* 空气感多重柔和暗影，不脏不生硬，字形完美浮现 */
                root.style.setProperty('--text-shadow-subtle', '0 2px 8px rgba(0, 0, 0, 0.35), 0 1px 2px rgba(0, 0, 0, 0.2)');
                
                /* 为Logo定制高清晰度的阻尼隔离暗影 */
                root.style.setProperty('--logo-text-shadow', '0 2px 5px rgba(0,0,0,0.85), 0 0.5px 1px rgba(0,0,0,0.5)');
            } else {
                root.style.setProperty('--text-primary-color', '#26211e');
                root.style.setProperty('--text-secondary-color', '#5a514b');
                root.style.setProperty('--text-tertiary-color', 'rgba(38, 33, 30, 0.5)');
                root.style.setProperty('--container-bg', '#f2ece7');
                
                /* 大幅下调强白色遮罩极限（降至0.72），彻底杜绝白色雾感 */
                root.style.setProperty('--scrim-color-strong', 'rgba(255, 255, 255, 0.72)');
                root.style.setProperty('--scrim-color-soft', 'rgba(255, 255, 255, 0.25)');
                root.style.setProperty('--scrim-color-transparent', 'rgba(255, 255, 255, 0)');
                
                /* 采用高雅纸张微凹深度，去除了任何生硬的白光投影 */
                root.style.setProperty('--text-shadow-subtle', '0 1px 2px rgba(38, 33, 30, 0.12), 0 3px 8px rgba(38, 33, 30, 0.04)');
                
                /* 为Logo配置微弱优雅托底阴影，阻断刺眼亮光 */
                root.style.setProperty('--logo-text-shadow', '0 1px 2px rgba(255, 255, 255, 0.95), 0 0px 1px rgba(38, 33, 30, 0.15)');
            }
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgElement = document.getElementById('poster-bg');
                    imgElement.removeAttribute('crossorigin');
                    imgElement.onload = function() { adjustTextColor(imgElement); };
                    imgElement.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function setRatio(ratio) {
            const wrapper = document.getElementById('poster-wrapper');
            const btn34 = document.getElementById('ratio-btn-3-4');
            const btn916 = document.getElementById('ratio-btn-9-16');

            if (ratio === '3-4') {
                wrapper.classList.remove('ratio-9-16');
                wrapper.classList.add('ratio-3-4');
                btn34.classList.add('bg-[#26211e]', 'text-white');
                btn34.classList.remove('text-[#5e544e]');
                btn916.classList.remove('bg-[#26211e]', 'text-white');
                btn916.classList.add('text-[#5e544e]');
            } else {
                wrapper.classList.remove('ratio-3-4');
                wrapper.classList.add('ratio-9-16');
                btn916.classList.add('bg-[#26211e]', 'text-white');
                btn916.classList.remove('text-[#5e544e]');
                btn34.classList.remove('bg-[#26211e]', 'text-white');
                btn34.classList.add('text-[#5e544e]');
            }
        }

        // 💎 二阶段：2.2 全海报区域拖放图片更换核心监听
        const dropzone = document.getElementById('poster-capture-area');
        
        window.addEventListener('DOMContentLoaded', () => {
            renderBrand();
            checkSubtitleChinese();

            // 双向绑定画布 inline contenteditable 文本变化到 modal 输入表单中 (二阶段：2.1)
            const inlineBindings = [
                { canvasId: 'title-part1', modalId: 'input-title1' },
                { canvasId: 'title-part2', modalId: 'input-title2' },
                { canvasId: 'subtitle-eng', modalId: 'input-sub-eng', callback: checkSubtitleChinese },
                { canvasId: 'subtitle-cn', modalId: 'input-sub-cn' },
                { canvasId: 'body-text1', modalId: 'input-body1' },
                { canvasId: 'body-text2', modalId: 'input-body2' }
            ];

            inlineBindings.forEach(binding => {
                const canvasEl = document.getElementById(binding.canvasId);
                const modalEl = document.getElementById(binding.modalId);
                if (canvasEl && modalEl) {
                    canvasEl.addEventListener('input', () => {
                        modalEl.value = canvasEl.innerText || canvasEl.textContent;
                        if (binding.callback) binding.callback();
                    });
                }
            });

            // 拖拽上传底图事件绑定
            const dropArea = document.getElementById('poster-capture-area');
            const dragOverlay = document.getElementById('drag-overlay');

            dropArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dragOverlay.classList.remove('hidden');
            });

            dropArea.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragOverlay.classList.add('hidden');
            });

            dropArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dragOverlay.classList.add('hidden');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const imgElement = document.getElementById('poster-bg');
                        imgElement.removeAttribute('crossorigin');
                        imgElement.onload = function() { adjustTextColor(imgElement); };
                        imgElement.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        // 模态框逻辑
        const modal = document.getElementById('text-modal');
        const modalContent = document.getElementById('text-modal-content');

        function openModal() {
            modal.classList.remove('hidden');
            const smartPaste = document.getElementById('input-smart-paste');
            if(smartPaste) smartPaste.value = '';

            document.getElementById('input-title1').value = document.getElementById('title-part1').innerText;
            document.getElementById('input-title2').value = document.getElementById('title-part2').innerText;
            document.getElementById('input-sub-eng').value = document.getElementById('subtitle-eng').innerText;
            document.getElementById('input-sub-cn').value = document.getElementById('subtitle-cn').innerText;
            
            const parseHtmlToText = (html) => html.replace(/<br\s*[\/]?>/gi, '\n').split('\n').map(line => line.trim()).join('\n');
            document.getElementById('input-body1').value = parseHtmlToText(document.getElementById('body-text1').innerHTML);
            document.getElementById('input-body2').value = parseHtmlToText(document.getElementById('body-text2').innerHTML);

            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function applyText() {
            document.getElementById('title-part1').innerText = document.getElementById('input-title1').value;
            document.getElementById('title-part2').innerText = document.getElementById('input-title2').value;
            document.getElementById('subtitle-eng').innerText = document.getElementById('input-sub-eng').value;
            document.getElementById('subtitle-cn').innerText = document.getElementById('input-sub-cn').value;
            
            document.getElementById('body-text1').innerHTML = document.getElementById('input-body1').value.replace(/\n/g, '<br>');
            document.getElementById('body-text2').innerHTML = document.getElementById('input-body2').value.replace(/\n/g, '<br>');

            // 应用中文字符旋转自动拦截检测
            checkSubtitleChinese();
            closeModal();
        }

        // 极速智能解析算法
        function autoParseText(event) {
            const rawText = document.getElementById('input-smart-paste').value;
            if (!rawText.trim()) return;

            const extract = (regex) => { const match = rawText.match(regex); return match ? match[1].trim() : null; };
            const title = extract(/(?:主标题|标题)[：:]\s*([^\n]+)/);
            const subTitle = extract(/(?:副标题)[：:]\s*([^\n]+)/);
            const bodyMatch = rawText.match(/(?:正文|文案)[：:]\s*([\s\S]+)/);
            const body = bodyMatch ? bodyMatch[1].trim() : null;

            if (title) {
                const parts = title.split(/[,，]/);
                if (parts.length > 1) {
                    const lastPart = parts.pop().trim();
                    document.getElementById('input-title1').value = parts.join('，') + '，';
                    document.getElementById('input-title2').value = lastPart;
                } else {
                    if (title.length > 6) {
                        document.getElementById('input-title1').value = title.slice(0, -4);
                        document.getElementById('input-title2').value = title.slice(-4);
                    } else {
                        document.getElementById('input-title1').value = title;
                        document.getElementById('input-title2').value = "";
                    }
                }
            }
            if (subTitle) {
                const parts = subTitle.split(/[·\-\|]/);
                if (parts.length > 1) {
                    document.getElementById('input-sub-eng').value = parts[0].trim();
                    document.getElementById('input-sub-cn').value = parts.slice(1).join('·').trim();
                } else {
                    const engMatch = subTitle.match(/^[a-zA-Z\s&]+/);
                    if (engMatch && engMatch[0].trim().length > 0) {
                        document.getElementById('input-sub-eng').value = engMatch[0].trim();
                        document.getElementById('input-sub-cn').value = subTitle.substring(engMatch[0].length).trim();
                    } else {
                        document.getElementById('input-sub-eng').value = "";
                        document.getElementById('input-sub-cn').value = subTitle;
                    }
                }
            }
            if (body) {
                const paras = body.split(/\n\s*\n/);
                if (paras.length > 1) {
                    document.getElementById('input-body1').value = paras[0].trim();
                    document.getElementById('input-body2').value = paras.slice(1).join('\n\n').trim();
                } else {
                    const lines = body.split('\n').filter(l => l.trim() !== '');
                    if (lines.length > 1) {
                        document.getElementById('input-body1').value = lines[0].trim();
                        document.getElementById('input-body2').value = lines.slice(1).join('\n').trim();
                    } else {
                        document.getElementById('input-body1').value = body;
                        document.getElementById('input-body2').value = "";
                    }
                }
            }

            const btn = event.currentTarget;
            const oldText = btn.innerText;
            btn.innerText = "✅ 识别并一键拆分成功";
            btn.classList.add("!bg-emerald-700", "!text-white"); 
            setTimeout(() => { btn.innerText = oldText; btn.classList.remove("!bg-emerald-700", "!text-white"); }, 2000);
        }

        // 10 种排版切换 (已重构 Layout 10，去除所有 formulaic 标签编号噪点)
        const layoutNames = ["经典极简", "电影中轴", "现代画册", "先锋解构", "美术馆展签", "无界视界", "独立宣言", "诗性留白", "极客包豪斯", "叙事主义"];
        let currentLayoutIndex = 0;

        // 💎 新增：排版切换渲染公共流逻辑 (前进与后退共用)
        function updateLayoutUI() {
            const container = document.getElementById('poster-capture-area');
            const btnTextSpan = document.getElementById('layout-btn-text');
            const decorContainer = document.getElementById('decor-elements');
            
            // 实时更新当前排版的序号和状态提示，强化交互认知
            btnTextSpan.innerText = `${layoutNames[currentLayoutIndex]} (${currentLayoutIndex + 1}/10)`;

            // 动态控制微缩定位符 (针对 10 套方案全面精调：彻底去除了 zen mono, NO.09 等编号及开发性字段)
            if (currentLayoutIndex === 0) {
                decorContainer.innerHTML = '';
            } else if (currentLayoutIndex === 1) {
                decorContainer.innerHTML = `<span class="decor-badge">ALL RIGHTS RESERVED</span>`;
            } else if (currentLayoutIndex === 2) {
                decorContainer.innerHTML = `<span class="decor-badge">MUSEUM ARCHIVE</span>`;
            } else if (currentLayoutIndex === 3) {
                decorContainer.innerHTML = `<span class="decor-badge">PERSPECTIVE FOCUS</span>`;
            } else if (currentLayoutIndex === 4) {
                decorContainer.innerHTML = '';
            } else if (currentLayoutIndex === 5) {
                decorContainer.innerHTML = `<span class="decor-badge">SPATIAL EDITORIAL</span>`;
            } else if (currentLayoutIndex === 6) {
                decorContainer.innerHTML = `<span class="decor-badge">ESTABLISHED 1890</span>`;
            } else if (currentLayoutIndex === 7) {
                // 诗性留白微缩地理标志
                decorContainer.innerHTML = `<span class="decor-badge">LATITUDE 31.2304° N</span><span class="decor-badge">LONGITUDE 121.4737° E</span>`;
            } else if (currentLayoutIndex === 8) {
                // 极客包豪斯微缩标
                decorContainer.innerHTML = `<span class="decor-badge">STRUCTURAL FORM</span>`;
            } else if (currentLayoutIndex === 9) {
                // 叙事主义微缩标
                decorContainer.innerHTML = `<span class="decor-badge">NARRATIVE CONCEPT</span>`;
            }
        }

        // 💎 前进切换排版
        function toggleLayout(event) {
            if (event) event.stopPropagation();
            const container = document.getElementById('poster-capture-area');
            container.classList.remove(`layout-${currentLayoutIndex + 1}`);
            currentLayoutIndex = (currentLayoutIndex + 1) % layoutNames.length;
            container.classList.add(`layout-${currentLayoutIndex + 1}`);
            updateLayoutUI();
        }

        // 💎 后退切换排版 (解决退后版式的便捷功能)
        function prevLayout(event) {
            if (event) event.stopPropagation();
            const container = document.getElementById('poster-capture-area');
            container.classList.remove(`layout-${currentLayoutIndex + 1}`);
            currentLayoutIndex = (currentLayoutIndex - 1 + layoutNames.length) % layoutNames.length;
            container.classList.add(`layout-${currentLayoutIndex + 1}`);
            updateLayoutUI();
        }

        // 印刷级超高清下载 (恢复至极致 5.0 倍数：实现 4K 印刷精度)
        function downloadPoster() {
            // ⚡️ 导出安全锁：自动将处于编辑状态聚焦的元素失去焦点，隐藏多余的编辑虚线外边框与光标
            if (document.activeElement && document.activeElement.blur) {
                document.activeElement.blur();
            }

            const captureArea = document.getElementById('poster-capture-area');
            const btnText = document.getElementById('download-btn-text');
            const originalText = btnText.innerText;

            btnText.innerText = "超清极致导出中...";
            captureArea.classList.add('is-exporting');
            
            const originalWidth = captureArea.style.width;
            const originalHeight = captureArea.style.height;
            
            const rect = captureArea.getBoundingClientRect();
            const intWidth = Math.round(rect.width);
            const intHeight = Math.round(rect.height);
            
            captureArea.style.width = intWidth + 'px';
            captureArea.style.height = intHeight + 'px';

            // ⚡️ 备份并临时强制写入实际的 offset 值，防止 html2canvas 不认识 object-position 变量 (一阶段：1.1 导出防护)
            const bgImg = document.getElementById('poster-bg');
            const originalObjectPosition = bgImg.style.objectPosition;
            const offsetX = document.getElementById('offset-x-slider').value + '%';
            const offsetY = document.getElementById('offset-y-slider').value + '%';
            bgImg.style.objectPosition = `${offsetX} ${offsetY}`;
            
            const isDark = document.documentElement.style.getPropertyValue('--text-primary-color') === 'rgb(250, 247, 245)' || 
                           document.documentElement.style.getPropertyValue('--text-primary-color') === '#ffffff' ||
                           document.documentElement.style.getPropertyValue('--text-primary-color') === '#faf7f5';
            const themeBgColor = isDark ? '#141211' : '#f2ece7';

            document.fonts.ready.then(() => {
                setTimeout(() => {
                    html2canvas(captureArea, {
                        scale: 5.0,            // ⚡️ 恢复至 5.0X 超高清视网膜导出，呈现极其锐利的字体边缘
                        useCORS: true,
                        allowTaint: false,
                        logging: false,
                        imageTimeout: 0,
                        width: intWidth,
                        height: intHeight,
                        backgroundColor: themeBgColor
                    }).then(canvas => {
                        // 还原海报的自适应弹性样式和位移
                        captureArea.style.width = originalWidth;
                        captureArea.style.height = originalHeight;
                        bgImg.style.objectPosition = originalObjectPosition;
                        captureArea.classList.remove('is-exporting');

                        const imgData = canvas.toDataURL('image/jpeg', 0.98);
                        const link = document.createElement('a');
                        link.href = imgData;
                        link.download = `Poster_${layoutNames[currentLayoutIndex]}_5K_UltraHD.jpg`;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        
                        btnText.innerText = originalText;
                    }).catch(err => {
                        console.error("海报生成失败:", err);
                        captureArea.style.width = originalWidth;
                        captureArea.style.height = originalHeight;
                        bgImg.style.objectPosition = originalObjectPosition;
                        captureArea.classList.remove('is-exporting');
                        btnText.innerText = originalText;
                    });
                }, 250); 
            });
        }
    </script>
