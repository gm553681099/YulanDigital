    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        // --- 图标组件集合 ---
        const IconSettings = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconUpload = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const IconDownload = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const IconSearch = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const IconAlertCircle = ({ size = 24, className = "", title }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><title>{title}</title><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const IconFileSpreadsheet = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2"></path><path d="M8 17h2"></path><path d="M14 13h2"></path><path d="M14 17h2"></path></svg>;
        const IconPackage = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>;
        const IconDollarSign = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const IconBarChart3 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"></path><rect width="4" height="7" x="7" y="10" rx="1"></rect><rect width="4" height="12" x="15" y="5" rx="1"></rect></svg>;
        const IconCalculator = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"></rect><line x1="8" x2="16" y1="6" y2="6"></line><line x1="16" x2="16" y1="14" y2="18"></line></svg>;
        const IconChevronUp = ({ size = 14, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"></polyline></svg>;
        const IconChevronDown = ({ size = 14, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconChevronsUpDown = ({ size = 14, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="7 15 12 20 17 15"></polyline><polyline points="7 9 12 4 17 9"></polyline></svg>;
        const IconTag = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>;
        const IconInfo = ({ size = 14, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconHelpCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconLayoutDashboard = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconTable = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="9" y2="21"/><line x1="15" x2="15" y1="9" y2="21"/></svg>;
        const IconAlertTriangle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>;
        const IconTrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>;
        const IconArrowDown = ({ size = 12, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>;
        const IconPanelLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M9 3v18"/></svg>;
        const IconCheckCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconLayers = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>;

        const App = () => {
          const initialSettings = {
            leadTime: 45, 
            safetyDays: 15,
            skuMultiplier: 4,      
            containerSize: 2520,   
            orderDaysA: 60,        
            orderDaysB: 120,       
            orderDaysC: 180,       
            demandCalcMethod: 'simple', 
            weight30d: 40,
            weight90d: 30,
            weightOlder: 30,
            minOrderFreq: 5, 
            coreMetric: 'qty', 
            abcThresholdA: 70, 
            abcThresholdB: 95, 
            basePeriod: 180,       
            endDate: new Date().toISOString().split('T')[0],
            overstockWarningDays: 270, 
            deadStockDays: 720         
          };
          
          const [draftSettings, setDraftSettings] = useState(initialSettings);
          const [appliedSettings, setAppliedSettings] = useState(initialSettings);
          const [rawData, setRawData] = useState([]);
          const [searchTerm, setSearchTerm] = useState('');
          const [isSidebarOpen, setIsSidebarOpen] = useState(true);
          const [uploadError, setUploadError] = useState(''); 
          const [sortConfig, setSortConfig] = useState({ key: 'd', direction: 'desc' }); 
          const [showUserGuide, setShowUserGuide] = useState(false); 
          const [showGuide, setShowGuide] = useState(false); 
          const [showAbcGuide, setShowAbcGuide] = useState(false);
          const [showAlgoSettings, setShowAlgoSettings] = useState(true); 
          const [parsedHeadersInfo, setParsedHeadersInfo] = useState(null);
          const [viewMode, setViewMode] = useState('table');
          const [clearanceView, setClearanceView] = useState('spec'); 
          const fileInputRef = useRef(null);
          const priceFileInputRef = useRef(null);
          const onOrderFileInputRef = useRef(null); 

          const [toast, setToast] = useState({ show: false, message: '', type: 'success' });
          const showToastMessage = (message, type = 'success') => {
              setToast({ show: true, message, type });
              setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3500); 
          };

          const handleSettingChange = (e) => {
            const { name, value } = e.target;
            setDraftSettings(prev => ({ 
                ...prev, 
                [name]: (name === 'endDate' || name === 'demandCalcMethod' || name === 'coreMetric') ? value : Number(value) 
            }));
          };

          const handleApplySettings = () => {
            let msg = "参数已保存，数据已按「目标水位填补模型」重新计算！";
            let msgType = "success";

            if (draftSettings.demandCalcMethod === 'weighted') {
                const totalW = draftSettings.weight30d + draftSettings.weight90d + draftSettings.weightOlder;
                if (totalW !== 100) {
                    msg = "加权平均的权重总和不是100%，系统已自动修正并在后台重新计算！";
                    msgType = "warning";
                } else if (rawData.length > 0 && !rawData[0].hasSales30d) {
                    msg = "已切换至加权模式，但由于数据源无[近30天销量]等列，系统自动降级为单列全权重计算。";
                    msgType = "warning";
                } else {
                    msg = "参数已保存，动态加权预测模型已重新计算完毕！";
                }
            }

            setAppliedSettings(draftSettings);
            showToastMessage(msg, msgType);
          };

          const cleanNumber = (val) => {
             if (!val) return 0;
             const cleaned = String(val).replace(/,/g, '').replace(/"/g, '').trim();
             return parseFloat(cleaned) || 0;
          };

          const parseDateString = (dateStr) => {
              if (!dateStr || dateStr === '-') return NaN;
              let s = String(dateStr).replace(/年/g, '-').replace(/月/g, '-').replace(/日/g, '').replace(/\//g, '-').trim();
              s = s.replace(/-$/, ''); 
              if (s.split('-').length === 2) s += '-01'; 
              return new Date(s).getTime();
          };

          const parseCSV = (text) => {
            if (text.charCodeAt(0) === 0xFEFF) {
                text = text.substring(1);
            }

            const lines = text.split(/\r\n|\n|\r/).filter(line => line.trim() !== '');
            if (lines.length === 0) return { data: [], headersFound: false, matchedColumns: null };
            
            let commas = 0, tabs = 0;
            const firstLineForCheck = lines[0] || '';
            commas = (firstLineForCheck.match(/,/g) || []).length;
            tabs = (firstLineForCheck.match(/\t/g) || []).length;
            const delimiter = tabs > commas ? '\t' : ',';
            
            const splitCSVRow = (str) => {
                const result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < str.length; i++) {
                    if (str[i] === '"') { inQuotes = !inQuotes; } 
                    else if (str[i] === delimiter && !inQuotes) { result.push(current.trim()); current = ''; } 
                    else { current += str[i]; }
                }
                result.push(current.trim());
                return result;
            };

            const getColumnIndex = (hdrs, exactArr, includeArr, usedSet) => {
                const clean = s => String(s).replace(/[\s\-_\(\)（）\uFEFF]/g, '').toLowerCase(); 
                for (let match of exactArr) {
                    const cMatch = clean(match);
                    const idx = hdrs.findIndex((h, i) => !usedSet.has(i) && clean(h) === cMatch);
                    if (idx !== -1) { usedSet.add(idx); return idx; }
                }
                for (let match of includeArr) {
                    const cMatch = clean(match);
                    const idx = hdrs.findIndex((h, i) => !usedSet.has(i) && clean(h).includes(cMatch));
                    if (idx !== -1) { usedSet.add(idx); return idx; }
                }
                return -1;
            };

            const headers = splitCSVRow(lines[0]).map(h => h.replace(/["\r]/g, ''));
            const usedCols = new Set();
            
            const colItemCode = getColumnIndex(headers, ['涂料编号', '涂料编码', '产品编号', '产品编码', '型号', '编号', '代码', 'SKU', '物料号', '商品编码'], ['编号', '编码', '型号', '代码', 'sku', '品号', '条码'], usedCols);
            const colItemName = getColumnIndex(headers, ['涂料名称', '产品名称', '品名', '名称'], ['名称', '品名'], usedCols);
            const colSpec = getColumnIndex(headers, ['规格', '容量', '包装'], ['规格', '容量', '包装'], usedCols);
            const colStock = getColumnIndex(headers, ['公司库存', '总库存', '库存', '当前库存', '结存'], ['库存', '结存', '实物'], usedCols);
            const colOnOrder = getColumnIndex(headers, ['采购在途', '在途库存', '在途', '已订购'], ['在途', '未交', '未到', '待收', '待入库', '已订'], usedCols);
            const colSales = getColumnIndex(headers, ['销量', '销售量', '总销量', '出库数量', '数量'], ['销量', '出库', '销售数'], usedCols);
            const colSales30d = getColumnIndex(headers, ['近30天销量', '30天销量', '月销量'], ['30天', '月销'], usedCols);
            const colSales90d = getColumnIndex(headers, ['近90天销量', '90天销量', '季销量'], ['90天', '季销'], usedCols);
            const colRevenue = getColumnIndex(headers, ['金额', '销售额', '销售金额', '营业额'], ['金额', '销售额'], usedCols);
            const colLaunchDate = getColumnIndex(headers, ['上市时间', '建档日期', '创建时间'], ['上市', '建档', '创建'], usedCols);
            const colOrderFreq = getColumnIndex(headers, ['订货频次', '订单数', '频次', '笔数'], ['频次', '笔数', '单数'], usedCols);

            const headersFound = colItemCode !== -1 || colItemName !== -1 || colSales !== -1 || colStock !== -1;
            if (!headersFound) return { data: [], headersFound: false, matchedColumns: null };

            const parsedData = [];
            for (let i = 1; i < lines.length; i++) {
              const values = splitCSVRow(lines[i]);
              if (values.length > 0) {
                const stockVal = colStock !== -1 ? cleanNumber(values[colStock]) : 0;
                const onOrderVal = colOnOrder !== -1 ? cleanNumber(values[colOnOrder]) : 0;
                const sales = colSales !== -1 ? cleanNumber(values[colSales]) : 0;
                const sales30 = colSales30d !== -1 && values[colSales30d] ? cleanNumber(values[colSales30d]) : null;
                const sales90 = colSales90d !== -1 && values[colSales90d] ? cleanNumber(values[colSales90d]) : null;
                const revenue = colRevenue !== -1 ? cleanNumber(values[colRevenue]) : 0;
                const orderFreqVal = colOrderFreq !== -1 && values[colOrderFreq] ? cleanNumber(values[colOrderFreq]) : null;
                const rawCode = colItemCode !== -1 && values[colItemCode] ? String(values[colItemCode]).replace(/"/g, '') : '';
                const rawName = colItemName !== -1 && values[colItemName] ? String(values[colItemName]).replace(/"/g, '') : '';
                
                if (!rawCode && !rawName && sales === 0 && revenue === 0 && stockVal === 0) continue;

                parsedData.push({
                  itemCode: rawCode || '-',
                  itemName: rawName || `未命名产品-${i}`,
                  spec: (colSpec !== -1 && values[colSpec]) ? String(values[colSpec]).replace(/"/g, '') : '-',
                  sales: sales,
                  sales30d: sales30,
                  hasSales30d: sales30 !== null,
                  sales90d: sales90,
                  hasSales90d: sales90 !== null,
                  revenue: revenue,
                  launchDate: (colLaunchDate !== -1 && values[colLaunchDate]) ? String(values[colLaunchDate]).replace(/"/g, '') : '-',
                  currentStock: stockVal,
                  onOrderStock: onOrderVal,
                  availableStock: stockVal + onOrderVal,
                  orderFreqConfig: orderFreqVal,
                  hasOrderFreq: colOrderFreq !== -1 && orderFreqVal !== null
                });
              }
            }
            
            const matchedColumns = {
                itemCode: colItemCode !== -1 ? headers[colItemCode] : null,
                stock: colStock !== -1 ? headers[colStock] : null,
                sales: colSales !== -1 ? headers[colSales] : null,
                sales30d: colSales30d !== -1 ? headers[colSales30d] : null,
            };
            return { data: parsedData, headersFound: true, matchedColumns };
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            setUploadError(''); 
            setParsedHeadersInfo(null);

            if (file.name.toLowerCase().endsWith('.xlsx') || file.name.toLowerCase().endsWith('.xls')) {
                setUploadError('格式拦截：您上传的是 Excel 原生文件。请在 Excel 中使用【另存为 -> CSV (逗号分隔)】保存后再导入。');
                if (fileInputRef.current) fileInputRef.current.value = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
              const buffer = event.target.result;
              const headerBytes = new Uint8Array(buffer).slice(0, 4);
              if ((headerBytes[0] === 0x50 && headerBytes[1] === 0x4B) || (headerBytes[0] === 0xD0 && headerBytes[1] === 0xCF)) {
                  setUploadError('格式伪装拦截：这是被强行修改后缀名的 Excel 文件，系统拒绝解析乱码。请老老实实通过 Excel【另存为 CSV】。');
                  setRawData([]); 
                  if (fileInputRef.current) fileInputRef.current.value = '';
                  return;
              }

              let text = new TextDecoder('utf-8').decode(buffer);
              let result = parseCSV(text);

              if (!result.headersFound) {
                try {
                  text = new TextDecoder('gbk').decode(buffer);
                  result = parseCSV(text);
                } catch (e) {
                  console.warn("GBK 解码失败", e);
                }
              }

              if (result.data.length === 0) {
                setUploadError('表格内容为空，或未能提取到有效的数据行。');
                setRawData([]);
              } else if (!result.headersFound) {
                setUploadError('无法定位表头：请确保第一行包含【涂料编号】、【涂料名称】、【销量】或【库存】等标准字段名。');
                setRawData([]); 
                setParsedHeadersInfo(null);
              } else {
                setRawData(result.data);
                setParsedHeadersInfo(result.matchedColumns);
                setViewMode('table');
                showToastMessage('数据载入成功，引擎已根据您的配置完成初次运算！', 'success');
                setSortConfig({ key: 'd', direction: 'desc' });
              }
              if (fileInputRef.current) fileInputRef.current.value = '';
            };
            reader.readAsArrayBuffer(file);
          };

          const processSupplementaryUpload = (e, type) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const buffer = event.target.result;
                let text = new TextDecoder('utf-8').decode(buffer);
                if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);

                const getHeaders = (txt) => {
                    const lines = txt.split(/\r\n|\n|\r/).filter(line => line.trim() !== '');
                    if(lines.length === 0) return [];
                    let commas = (lines[0].match(/,/g) || []).length;
                    let tabs = (lines[0].match(/\t/g) || []).length;
                    const delimiter = tabs > commas ? '\t' : ',';
                    let current = ''; let inQuotes = false;
                    const result = [];
                    for (let i = 0; i < lines[0].length; i++) {
                        if (lines[0][i] === '"') inQuotes = !inQuotes;
                        else if (lines[0][i] === delimiter && !inQuotes) { result.push(current.trim()); current = ''; }
                        else current += lines[0][i];
                    }
                    result.push(current.trim());
                    return result.map(h => h.replace(/["\r]/g, ''));
                };

                let headers = getHeaders(text);
                const clean = s => String(s).replace(/[\s\-_\(\)（）\uFEFF]/g, '').toLowerCase();
                
                const findCol = (hdrs, exactArr, includeArr) => {
                    for (let match of exactArr) {
                        const idx = hdrs.findIndex(h => clean(h) === clean(match));
                        if (idx !== -1) return idx;
                    }
                    for (let match of includeArr) {
                        const idx = hdrs.findIndex(h => clean(h).includes(clean(match)));
                        if (idx !== -1) return idx;
                    }
                    return -1;
                };

                const codeExact = ['涂料编号', '涂料编码', '产品编号', '产品编码', '型号', '编号', '代码', 'SKU', '物料号', '商品编码'];
                const codeInclude = ['编号', '编码', '型号', '代码', 'sku', '品号', '条码'];
                const priceExact = ['单价', '经销价', '销售价', '标准价', '结算价', '含税单价', '无税单价', '成本价'];
                const priceInclude = ['单价', '价格', '售价', '成本', '金额'];
                const onOrderExact = ['采购在途', '在途库存', '在途数量', '在途', '已订购数量', '未交数量'];
                const onOrderInclude = ['在途', '未交', '未到', '待收', '待入库', '已订'];

                let codeIdx = findCol(headers, codeExact, codeInclude);
                let targetIdx = type === 'price' ? findCol(headers, priceExact, priceInclude) : findCol(headers, onOrderExact, onOrderInclude);

                if (codeIdx === -1 || targetIdx === -1) {
                    try {
                        text = new TextDecoder('gbk').decode(buffer);
                        if (text.charCodeAt(0) === 0xFEFF) text = text.substring(1);
                        headers = getHeaders(text);
                        codeIdx = findCol(headers, codeExact, codeInclude);
                        targetIdx = type === 'price' ? findCol(headers, priceExact, priceInclude) : findCol(headers, onOrderExact, onOrderInclude);
                    } catch(err) {}
                }

                if (codeIdx === -1 || targetIdx === -1) {
                    showToastMessage(`未识别到表头。补充表需包含【编号/编码】和【${type === 'price' ? '单价/价格' : '在途/未交'}】相关字段。`, 'error');
                    if(type === 'price' && priceFileInputRef.current) priceFileInputRef.current.value = '';
                    if(type === 'onOrder' && onOrderFileInputRef.current) onOrderFileInputRef.current.value = '';
                    return;
                }

                const lines = text.split(/\r\n|\n|\r/).filter(line => line.trim() !== '');
                let commas = (lines[0].match(/,/g) || []).length;
                let tabs = (lines[0].match(/\t/g) || []).length;
                const delimiter = tabs > commas ? '\t' : ',';

                const splitCSVRow = (str) => {
                    const result = [];
                    let current = ''; let inQuotes = false;
                    for (let i = 0; i < str.length; i++) {
                        if (str[i] === '"') inQuotes = !inQuotes;
                        else if (str[i] === delimiter && !inQuotes) { result.push(current.trim()); current = ''; }
                        else current += str[i];
                    }
                    result.push(current.trim());
                    return result;
                };

                const dataMap = {};
                const cleanCodeStr = str => String(str).replace(/[\s\-_]/g, '').toUpperCase();

                for (let i = 1; i < lines.length; i++) {
                    const row = splitCSVRow(lines[i]);
                    if (row.length > Math.max(codeIdx, targetIdx)) {
                        const rawCode = row[codeIdx].replace(/["\r]/g, '').trim();
                        const code = cleanCodeStr(rawCode);
                        const valStr = row[targetIdx].replace(/["\r,]/g, '').trim();
                        const val = (valStr === '' || valStr === '-') ? 0 : parseFloat(valStr);
                        if (code && !isNaN(val)) {
                            dataMap[code] = val;
                        }
                    }
                }

                let updatedCount = 0;
                const newData = rawData.map(item => {
                    const itemCleanCode = cleanCodeStr(item.itemCode);
                    if (dataMap[itemCleanCode] !== undefined) {
                        updatedCount++;
                        if (type === 'price') {
                            return { ...item, uploadedPrice: dataMap[itemCleanCode] };
                        } else {
                            return { 
                                ...item, 
                                onOrderStock: dataMap[itemCleanCode],
                                availableStock: item.currentStock + dataMap[itemCleanCode]
                            };
                        }
                    }
                    return item;
                });

                if(updatedCount > 0) {
                    setRawData(newData);
                    showToastMessage(`成功匹配并导入了 ${updatedCount} 款产品的${type === 'price' ? '单价' : '在途'}数据！`, 'success');
                } else {
                    showToastMessage('匹配失败：未能与当前库存数据的任何编号对齐。请检查编号格式。', 'warning');
                }
                
                if(type === 'price' && priceFileInputRef.current) priceFileInputRef.current.value = '';
                if(type === 'onOrder' && onOrderFileInputRef.current) onOrderFileInputRef.current.value = '';
            };
            reader.readAsArrayBuffer(file);
          };

          const handlePriceUpload = (e) => { processSupplementaryUpload(e, 'price'); };
          const handleOnOrderUpload = (e) => { processSupplementaryUpload(e, 'onOrder'); };

          const processedResult = useMemo(() => {
            if (rawData.length === 0) return { data: [], totalContainers: 0, targetTotalPurchase: 0, containerFilledQty: 0, allowPadding: false, paddingReason: '无数据' };
            const end = new Date(appliedSettings.endDate);

            let mappedData = rawData.map(item => {
                let effectiveDays = appliedSettings.basePeriod;
                if (item.launchDate && item.launchDate !== '-') {
                  const launchTime = parseDateString(item.launchDate);
                  if (!isNaN(launchTime)) {
                    const diffTime = end.getTime() - launchTime; 
                    if (diffTime > 0) {
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        if (diffDays < appliedSettings.basePeriod) effectiveDays = diffDays;
                    } else { effectiveDays = 1; }
                  }
                }
                
                let unitPrice = item.uploadedPrice !== undefined ? item.uploadedPrice : (item.sales > 0 ? (item.revenue / item.sales) : 0);
                let rawD = 0;
                if (appliedSettings.demandCalcMethod === 'weighted') {
                    if (item.hasSales30d && item.hasSales90d) {
                        let daysTotal = effectiveDays;
                        let totalW = appliedSettings.weight30d + appliedSettings.weight90d + appliedSettings.weightOlder;
                        let w30 = (appliedSettings.weight30d / totalW);
                        let w90 = (appliedSettings.weight90d / totalW);
                        let wOld = (appliedSettings.weightOlder / totalW);
                        
                        if (daysTotal <= 30) {
                            rawD = item.sales / daysTotal;
                        } else if (daysTotal <= 90) {
                            let d30 = item.sales30d / 30;
                            let dOlder = Math.max(0, item.sales - item.sales30d) / Math.max(1, daysTotal - 30);
                            let w1 = w30 / (w30 + w90); 
                            let w2 = w90 / (w30 + w90);
                            rawD = (d30 * w1) + (dOlder * w2);
                        } else {
                            let d30 = item.sales30d / 30;
                            let d90 = Math.max(0, item.sales90d - item.sales30d) / 60;
                            let dOlder = Math.max(0, item.sales - item.sales90d) / Math.max(1, daysTotal - 90);
                            rawD = (d30 * w30) + (d90 * w90) + (dOlder * wOld);
                        }
                    } else {
                        rawD = effectiveDays > 0 ? (item.sales / effectiveDays) : 0;
                    }
                } else {
                    rawD = effectiveDays > 0 ? (item.sales / effectiveDays) : 0;
                }

                let freqPenalty = 1;
                if (item.hasOrderFreq && item.orderFreqConfig > 0) {
                    if (item.orderFreqConfig < appliedSettings.minOrderFreq) freqPenalty = item.orderFreqConfig / appliedSettings.minOrderFreq;
                }
                
                let d = rawD * freqPenalty;
                const pureD = effectiveDays > 0 ? (item.sales / effectiveDays) : 0;
                const physicalCoverDays = pureD > 0 ? (item.currentStock / pureD) : (item.currentStock > 0 ? Infinity : 0);
                const totalCoverDays = pureD > 0 ? (item.availableStock / pureD) : (item.availableStock > 0 ? Infinity : 0);
                
                let calcSales = item.sales;
                if (appliedSettings.demandCalcMethod === 'weighted') {
                    calcSales = d * effectiveDays;
                }
                let calcRevenue = unitPrice > 0 ? (calcSales * unitPrice) : item.revenue;
                
                let sortValue = calcSales; 
                if (appliedSettings.coreMetric === 'revenue') {
                    sortValue = calcRevenue; 
                }

                const isQtStr = (str) => {
                    if(!str) return false;
                    const upper = String(str).toUpperCase();
                    return upper.includes('QT') || upper.includes('夸托') || upper.includes('夸脱');
                };
                const isColorantStr = (str) => {
                    if(!str) return false;
                    return String(str).includes('色浆');
                };
                const isExcludedQt = (isQtStr(item.spec) || isQtStr(item.itemName)) && !(isColorantStr(item.spec) || isColorantStr(item.itemName));

                let promoAction = '-', promoLevel = 0;
                if (item.currentStock === 0) { promoAction = '健康 (零库存)'; promoLevel = 0; } 
                else if (physicalCoverDays === Infinity) { promoAction = '无动销死库'; promoLevel = 2; } 
                else if (physicalCoverDays > appliedSettings.deadStockDays) { promoAction = '重度积压'; promoLevel = 2; } 
                else if (physicalCoverDays > appliedSettings.overstockWarningDays) { promoAction = '滞销预警'; promoLevel = 1; } 
                else { promoAction = '健康流转'; promoLevel = 0; }

                return { 
                  ...item, unitPrice, effectiveDays, d, pureD, freqPenalty,
                  calcSales, calcRevenue, sortValue,
                  physicalCoverDays, totalCoverDays, promoAction, promoLevel, isExcludedQt,
                  rop: 0, targetStock: 0, basePurchase: 0, actualPurchase: 0, padQty: 0, initialCapital: 0, 
                  needsRestock: false, isCritical: false, immediateRisk: false
                };
            });

            mappedData.sort((a, b) => b.sortValue - a.sortValue);
            let totalSortValue = mappedData.reduce((sum, item) => sum + item.sortValue, 0);
            let runningVal = 0;

            const step1Data = mappedData.map(item => {
                runningVal += item.sortValue;
                const cumPct = totalSortValue > 0 ? runningVal / totalSortValue : 0;
                let abcClass = 'C', classLabel = 'C类 (极低频长尾)';
                const thresholdA = appliedSettings.abcThresholdA / 100;
                const thresholdB = appliedSettings.abcThresholdB / 100;

                if (cumPct <= thresholdA) { abcClass = 'A'; classLabel = 'A类 (高频畅销)'; } 
                else if (cumPct <= thresholdB) { abcClass = 'B'; classLabel = 'B类 (低频常规)'; } 
                return { ...item, abcClass, classLabel };
            });

            let totalBasePurchase = 0;
            step1Data.forEach(item => {
                let sL = appliedSettings.leadTime;
                let sSS = appliedSettings.safetyDays;
                let oqDays = item.abcClass === 'A' ? appliedSettings.orderDaysA : 
                            (item.abcClass === 'B' ? appliedSettings.orderDaysB : appliedSettings.orderDaysC);

                let rop = Math.ceil(item.d * (sL + sSS)); 
                let oq = Math.ceil(item.d * oqDays); 
                let targetInitialStock = rop + oq; 
                
                item.rop = item.isExcludedQt ? 0 : rop;
                item.targetStock = item.isExcludedQt ? 0 : targetInitialStock;
                item.isCritical = !item.isExcludedQt && item.availableStock <= rop && item.d > 0; 
                item.immediateRisk = !item.isExcludedQt && item.currentStock <= rop && item.d > 0; 

                if (!item.isExcludedQt && item.d > 0) {
                    let rawPurchase = targetInitialStock - item.availableStock;
                    if (rawPurchase > 0) {
                        let base = Math.ceil(rawPurchase / appliedSettings.skuMultiplier) * appliedSettings.skuMultiplier;
                        item.basePurchase = base;
                        item.actualPurchase = base;
                        item.needsRestock = true; 
                        totalBasePurchase += base;
                    }
                }
            });

            let totalContainers = 0;
            let targetTotalPurchase = 0;
            let containerFilledQty = totalBasePurchase;
            let allowPadding = false;
            let paddingReason = '当前无任何备货需求';

            if (totalBasePurchase > 0) {
                const abCriticalCount = step1Data.filter(i => (i.abcClass === 'A' || i.abcClass === 'B') && i.isCritical).length;
                const cItems = step1Data.filter(i => i.abcClass === 'C' && !i.isExcludedQt);
                const cCriticalCount = cItems.filter(i => i.isCritical).length;
                const cCriticalRatio = cItems.length > 0 ? (cCriticalCount / cItems.length) : 0;

                if (abCriticalCount > 0) {
                    allowPadding = true;
                    paddingReason = 'A/B类跌破红线告急，启动满柜凑单';
                } else if (cCriticalRatio >= 0.6) {
                    allowPadding = true;
                    paddingReason = `C类大面积告急(${(cCriticalRatio*100).toFixed(0)}%)，启动满柜凑单`;
                } else {
                    allowPadding = false;
                    paddingReason = '暂无紧急缺货，仅做按需零星补平(免积压)';
                }

                if (allowPadding) {
                    totalContainers = Math.ceil(totalBasePurchase / appliedSettings.containerSize);
                    targetTotalPurchase = totalContainers * appliedSettings.containerSize;
                    let gap = targetTotalPurchase - totalBasePurchase;

                    let candidates = step1Data.filter(i => i.needsRestock && i.pureD > 0 && !i.isExcludedQt);
                    if (candidates.length === 0) candidates = step1Data.filter(i => i.pureD > 0 && !i.isExcludedQt);

                    if (candidates.length > 0) {
                        let maxLoops = 10000; 
                        
                        while (gap > 0 && maxLoops-- > 0) {
                            let under32Candidates = candidates.filter(i => i.actualPurchase < 32);
                            if (under32Candidates.length === 0) break; 
                            
                            let bestItem = under32Candidates[0];
                            let minCoverDays = Infinity;

                            for (let i = 0; i < under32Candidates.length; i++) {
                                let it = under32Candidates[i];
                                let futureCover = (it.availableStock + it.actualPurchase) / it.pureD;
                                if (futureCover < minCoverDays) {
                                    minCoverDays = futureCover;
                                    bestItem = it;
                                }
                            }
                            bestItem.actualPurchase += appliedSettings.skuMultiplier;
                            bestItem.padQty += appliedSettings.skuMultiplier;
                            gap -= appliedSettings.skuMultiplier;
                        }

                        while (gap > 0 && maxLoops-- > 0) {
                            let bestItem = candidates[0];
                            let minCoverDays = Infinity;

                            for (let i = 0; i < candidates.length; i++) {
                                let it = candidates[i];
                                let classMultiplier = it.abcClass === 'A' ? 1.0 : (it.abcClass === 'B' ? 1.5 : 2.0); 
                                let futureCover = ((it.availableStock + it.actualPurchase) / it.pureD) * classMultiplier;
                                if (futureCover < minCoverDays) {
                                    minCoverDays = futureCover;
                                    bestItem = it;
                                }
                            }
                            bestItem.actualPurchase += appliedSettings.skuMultiplier;
                            bestItem.padQty += appliedSettings.skuMultiplier;
                            gap -= appliedSettings.skuMultiplier;
                        }
                    }
                    containerFilledQty = targetTotalPurchase;
                } else {
                    totalContainers = (totalBasePurchase / appliedSettings.containerSize).toFixed(2);
                    targetTotalPurchase = totalBasePurchase;
                    containerFilledQty = totalBasePurchase;
                }
            }

            step1Data.forEach(item => {
                item.initialCapital = item.actualPurchase * item.unitPrice;
            });

            return { data: step1Data, totalContainers, targetTotalPurchase, containerFilledQty, allowPadding, paddingReason };
          }, [rawData, appliedSettings]); 

          const processedData = processedResult.data;

          const filteredData = useMemo(() => {
            if (!searchTerm.trim()) return processedData;
            const keywords = searchTerm.toLowerCase().trim().split(/\s+/);
            return processedData.filter(item => {
                const combinedStr = [ item.itemCode || '', item.itemName || '', item.spec || '' ].join(' ').toLowerCase();
                const cleanCombinedStr = combinedStr.replace(/[\s\-_]/g, '');
                return keywords.every(kw => {
                    const cleanKw = kw.replace(/[\s\-_]/g, '');
                    return combinedStr.includes(kw) || cleanCombinedStr.includes(cleanKw);
                });
            });
          }, [processedData, searchTerm]);

          const sortedData = useMemo(() => {
            let sortableItems = [...filteredData];
            if (sortConfig !== null) {
              sortableItems.sort((a, b) => {
                let valA = a[sortConfig.key]; let valB = b[sortConfig.key];
                if (valA === undefined) valA = 0; if (valB === undefined) valB = 0;
                if (typeof valA === 'string') valA = valA.toLowerCase();
                if (typeof valB === 'string') valB = valB.toLowerCase();
                if (valA === valB) return 0;
                if (valA === null || valA === '') return 1;
                if (valB === null || valB === '') return -1;
                if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
              });
            }
            return sortableItems;
          }, [filteredData, sortConfig]);

          const requestSort = (key) => {
            let direction = 'asc';
            if (sortConfig && sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
            setSortConfig({ key, direction });
          };

          const SortableHeader = ({ label, sortKey, align = "left", className = "", title = "" }) => {
            const isActive = sortConfig.key === sortKey;
            return (
                <th className={`py-2.5 px-2 font-semibold text-slate-600 border-b cursor-pointer hover:bg-slate-200 transition-colors select-none ${align === 'right' ? 'text-right' : 'text-left'} ${className}`} onClick={() => requestSort(sortKey)} title={title}>
                    <div className={`flex items-center gap-1 ${align === 'right' ? 'justify-end' : 'justify-start'}`}>
                        {label}
                        <span className="text-slate-400 shrink-0">
                            {isActive ? (sortConfig.direction === 'asc' ? <IconChevronUp /> : <IconChevronDown />) : <IconChevronsUpDown className="opacity-30" />}
                        </span>
                    </div>
                </th>
            );
          };

          const metrics = useMemo(() => {
            let totalA = 0, totalB = 0, totalC = 0, totalCapital = 0, totalStock = 0;
            let totalOverstockItems = 0;
            processedData.forEach(item => {
              if (item.abcClass === 'A') totalA++;
              if (item.abcClass === 'B') totalB++;
              if (item.abcClass === 'C') totalC++;
              totalCapital += item.initialCapital; 
              totalStock += item.actualPurchase;
              if (item.promoLevel > 0) totalOverstockItems++;
            });
            return { totalA, totalB, totalC, totalCapital, totalStock, totalItems: processedData.length, totalOverstockItems };
          }, [processedData]);
          
          const dashboardData = useMemo(() => {
             let healthyFunds = 0, warningFunds = 0, deadFunds = 0;
             let healthyQty = 0, warningQty = 0, deadQty = 0;
             let safeItems = 0, restockItems = 0;
             let restockCapital = 0, restockQty = 0;
             
             let age30 = { count: 0, qty: 0, fund: 0, name: '≤30天', color: '#10b981' };
             let age90 = { count: 0, qty: 0, fund: 0, name: '31-90天', color: '#34d399' };
             let age180 = { count: 0, qty: 0, fund: 0, name: '91-180天', color: '#fbbf24' };
             let age360 = { count: 0, qty: 0, fund: 0, name: '181-360天', color: '#f59e0b' };
             let ageOver = { count: 0, qty: 0, fund: 0, name: '>360天', color: '#ef4444' };
             let ageDead = { count: 0, qty: 0, fund: 0, name: '无动销', color: '#94a3b8' };

             processedData.forEach(item => {
                 const fund = item.currentStock * item.unitPrice;
                 const qty = item.currentStock;
                 
                 if (item.promoLevel === 0) { healthyFunds += fund; healthyQty += qty; }
                 else if (item.promoLevel === 1) { warningFunds += fund; warningQty += qty; }
                 else { deadFunds += fund; deadQty += qty; }

                 if (item.needsRestock) {
                     restockItems++;
                     restockCapital += item.initialCapital;
                     restockQty += item.actualPurchase;
                 } else if (item.d > 0) {
                     safeItems++;
                 }

                 if (item.currentStock > 0) {
                     if (item.physicalCoverDays === Infinity) { ageDead.count++; ageDead.qty+=qty; ageDead.fund+=fund; }
                     else if (item.physicalCoverDays > 360) { ageOver.count++; ageOver.qty+=qty; ageOver.fund+=fund; }
                     else if (item.physicalCoverDays > 180) { age360.count++; age360.qty+=qty; age360.fund+=fund; }
                     else if (item.physicalCoverDays > 90) { age180.count++; age180.qty+=qty; age180.fund+=fund; }
                     else if (item.physicalCoverDays > 30) { age90.count++; age90.qty+=qty; age90.fund+=fund; }
                     else { age30.count++; age30.qty+=qty; age30.fund+=fund; }
                 }
             });

             const restockList = processedData
                 .filter(i => i.needsRestock)
                 .sort((a,b) => b.actualPurchase - a.actualPurchase)
                 .slice(0, 5);

             const fullClearanceItems = processedData
                 .filter(i => i.promoLevel > 0)
                 .map(i => ({...i, deadFund: i.currentStock * i.unitPrice}));

             const initBreakdownObj = () => ({ warningQty: 0, warningFund: 0, deadQty: 0, deadFund: 0 });
             const breakdown = {
                spec: { '加仑': initBreakdownObj(), '夸脱': initBreakdownObj(), '其它': initBreakdownObj() },
                series: { '百年': initBreakdownObj(), '极净': initBreakdownObj(), '至臻': initBreakdownObj(), 'PF': initBreakdownObj(), '色浆': initBreakdownObj(), '其它': initBreakdownObj() },
                baseType: { '超深基': initBreakdownObj(), '深基': initBreakdownObj(), '浅基(白基)': initBreakdownObj(), '其它': initBreakdownObj() }
             };

             fullClearanceItems.forEach(item => {
                 const nameUpper = (item.itemName || '').toUpperCase();
                 const specUpper = (item.spec || '').toUpperCase();
                 const qty = item.currentStock;
                 const fund = item.deadFund;
                 
                 const isWarning = item.promoLevel === 1;
                 const isDead = item.promoLevel >= 2;

                 const addData = (cat, key) => {
                     if (!breakdown[cat][key]) breakdown[cat][key] = initBreakdownObj();
                     if (isWarning) { breakdown[cat][key].warningQty += qty; breakdown[cat][key].warningFund += fund; }
                     if (isDead) { breakdown[cat][key].deadQty += qty; breakdown[cat][key].deadFund += fund; }
                 };

                 if (specUpper.includes('加仑') || specUpper.includes('GL') || nameUpper.includes('加仑')) { addData('spec', '加仑'); }
                 else if (specUpper.includes('夸脱') || specUpper.includes('夸托') || specUpper.includes('QT') || nameUpper.includes('夸脱')) { addData('spec', '夸脱'); }
                 else { addData('spec', '其它'); }

                 if (nameUpper.includes('百年')) { addData('series', '百年'); }
                 else if (nameUpper.includes('极净')) { addData('series', '极净'); }
                 else if (nameUpper.includes('至臻')) { addData('series', '至臻'); }
                 else if (nameUpper.includes('PF') || nameUpper.includes('PRO')) { addData('series', 'PF'); }
                 else if (nameUpper.includes('色浆') || specUpper.includes('色浆')) { addData('series', '色浆'); }
                 else { addData('series', '其它'); }

                 if (nameUpper.includes('超深基') || nameUpper.includes('UD') || nameUpper.includes('ULTRA')) { addData('baseType', '超深基'); }
                 else if (nameUpper.includes('深基') || nameUpper.includes('DP') || nameUpper.includes('DEEP')) { addData('baseType', '深基'); }
                 else if (nameUpper.includes('浅基') || nameUpper.includes('白基') || nameUpper.includes('PASTEL') || nameUpper.includes('LIGHT')) { addData('baseType', '浅基(白基)'); }
                 else { addData('baseType', '其它'); }
             });

             const formatBreakdown = (obj) => {
                 return Object.keys(obj)
                     .map(k => {
                         const totalQty = obj[k].warningQty + obj[k].deadQty;
                         const totalFund = obj[k].warningFund + obj[k].deadFund;
                         return { name: k, ...obj[k], totalQty, totalFund };

                     .sort((a, b) => {
                         const valA = appliedSettings.coreMetric === 'qty' ? a.totalQty : a.totalFund;
                         const valB = appliedSettings.coreMetric === 'qty' ? b.totalQty : b.totalFund;
                         return valB - valA;
                     });
             };

                 return {
                     funds: [
                         { name: `健康流转`, value: healthyFunds, qty: healthyQty, color: '#10b981' },
                         { name: `轻度积压预警`, value: warningFunds, qty: warningQty, color: '#f59e0b' },

                     ],

                     totalQty: healthyQty + warningQty + deadQty,

                     age: [age30, age90, age180, age360, ageOver, ageDead],
                     restockList,
                     clearanceBreakdown: {
                         spec: formatBreakdown(breakdown.spec),

                     }

                  escapeCSV(item.classLabel), 
                  Math.round(item.calcSales), item.d.toFixed(2),

                ].join(',');
              })
            ].join('\n');

            const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');

            link.setAttribute('href', url);

                        <div className="bg-gradient-to-br from-indigo-600 to-blue-700 p-3 rounded-xl border border-blue-800 shadow-md flex items-center gap-3 text-white relative overflow-hidden">
                          <div className="absolute right-0 top-0 w-24 h-24 bg-white/10 rounded-full -mr-8 -mt-8 pointer-events-none"></div>
                          <div className="w-9 h-9 bg-white/20 rounded-lg flex items-center justify-center shrink-0">
                            <IconLayers className="text-white" size={18} />
                          </div>
                          <div className="truncate relative z-10">
                            <p className="text-[10px] font-bold text-blue-100 mb-0.5">算法凑足整柜数</p>
                            <p className="text-xl font-bold leading-none">{processedResult.totalContainers} <span className="text-[10px] font-normal text-blue-200">柜</span></p>
                          </div>
                        </div>

                        <div className="bg-white p-3 rounded-xl border border-blue-200 shadow-sm flex items-center gap-3 ring-1 ring-blue-50">
                          <div className="w-9 h-9 bg-blue-50 rounded-lg flex items-center justify-center shrink-0">
                            <IconBarChart3 className="text-blue-600" size={18} />
                          </div>
                          <div className="w-full pr-1 truncate">
                            <p className="text-[10px] font-bold text-slate-500 mb-0.5">ABC 评级概况</p>
                            <div className="flex items-end gap-1.5 leading-none">
                              <span className="text-[11px] font-bold text-blue-700" title="A类畅销款">A:{metrics.totalA}</span>
                              <span className="text-[11px] font-bold text-emerald-700" title="B类平销款">B:{metrics.totalB}</span>
                              <span className="text-[11px] font-bold text-slate-500" title="C类长尾款">C:{metrics.totalC}</span>
                            </div>
                          </div>
                        </div>

                        <div className="bg-white p-3 rounded-xl border border-emerald-200 shadow-sm flex items-center gap-3">
                          <div className="w-9 h-9 bg-emerald-50 rounded-lg flex items-center justify-center shrink-0">
                            <IconUpload className="text-emerald-600" size={18} />
                          </div>
                          <div className="truncate">
                            <p className="text-[10px] font-bold text-slate-500 mb-0.5">系统排单总量</p>
                            <p className="text-lg font-bold text-emerald-700 leading-none">{processedResult.containerFilledQty.toLocaleString()} <span className="text-[10px] font-normal text-slate-400">件</span></p>
                          </div>
                        </div>

                        <div className="bg-white p-3 rounded-xl border border-amber-200 shadow-sm flex items-center gap-3">
                          <div className="w-9 h-9 bg-amber-50 rounded-lg flex items-center justify-center shrink-0">
                            <IconDollarSign className="text-amber-600" size={18} />
                          </div>
                          <div className="truncate">
                            <p className="text-[10px] font-bold text-slate-500 mb-0.5">预计采购资金</p>
                            <p className="text-lg font-bold text-amber-700 leading-none truncate" title={`¥${metrics.totalCapital.toFixed(2)}`}>¥{(metrics.totalCapital / 10000).toFixed(2)} <span className="text-[10px] font-normal text-slate-400">万</span></p>
                          </div>
                        </div>

                        <div className="bg-white p-3 rounded-xl border border-rose-200 shadow-sm flex items-center gap-3">
                          <div className="w-9 h-9 bg-rose-50 rounded-lg flex items-center justify-center shrink-0">
                            <IconTag className="text-rose-600" size={18} />
                          </div>
                          <div className="truncate">
                            <p className="text-[10px] font-bold text-slate-500 mb-0.5">死库/滞销清理</p>
                            <p className="text-lg font-bold text-rose-700 leading-none">{metrics.totalOverstockItems} <span className="text-[10px] font-normal text-slate-400">款待处理</span></p>
                          </div>
                        </div>
                      </div>

                      <div className="bg-white rounded-xl border border-slate-200 shadow-sm flex flex-col flex-1 min-h-[300px]">
                        <div className="p-3 border-b border-slate-100 flex items-center justify-between bg-slate-50/50 shrink-0">
                          <h3 className="font-bold text-slate-800 text-sm flex items-center gap-2">
                             备货与风险明细表 <span className="text-xs font-normal text-slate-500 ml-2">(包含双轴周转预警计算)</span>
                          </h3>
                          <div className="relative">
                            <IconSearch className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400" size={14} />
                            <input type="text" placeholder="搜索编号、名称、规格..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} 
                              className="pl-8 pr-3 py-1.5 text-xs border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none w-64 font-medium" />
                          </div>
                        </div>
                        
                        <div className="overflow-auto flex-1 custom-scrollbar">
                          <table className="w-full text-left border-collapse text-xs whitespace-nowrap">
                            <thead className="bg-slate-50 sticky top-0 z-10 shadow-sm">
                              <tr>
                                <SortableHeader label="涂料型号" sortKey="itemCode" />
                                <SortableHeader label="名称与规格" sortKey="itemName" />
                                <SortableHeader label="层级" sortKey="classLabel" />
                                <SortableHeader label="日均发货" sortKey="d" align="right" />
                                <SortableHeader label="公司库存" sortKey="currentStock" align="right" className="bg-slate-100 border-l border-slate-200 text-slate-700" />
                                <SortableHeader label="实物周转" sortKey="physicalCoverDays" align="right" className="bg-slate-100 text-slate-700" />
                                <SortableHeader label="采购在途" sortKey="onOrderStock" align="right" className="bg-emerald-50 text-emerald-700 border-l border-emerald-100" />
                                <SortableHeader label="可用总库" sortKey="availableStock" align="right" className="bg-blue-50 text-blue-900 border-l border-blue-100 font-bold" />
                                <SortableHeader label="总库周转" sortKey="totalCoverDays" align="right" className="bg-blue-50 text-blue-800" />
                                <SortableHeader label="系统状态" sortKey="promoLevel" align="center" className="bg-rose-50/50 border-l border-rose-100" />
                                <SortableHeader label="红线 / 目标位" sortKey="rop" align="right" className="bg-red-50 text-red-700 font-bold border-l border-red-100" />
                                <SortableHeader label="刚需量" sortKey="basePurchase" align="right" className="bg-purple-50 text-purple-800" />
                                <SortableHeader label="凑柜追加" sortKey="padQty" align="right" className="bg-purple-100/50 text-purple-600" />
                                <SortableHeader label="最终下单" sortKey="actualPurchase" align="right" className="bg-purple-100 text-purple-900 font-bold border-r border-purple-200" />
                                <SortableHeader label="预估资金" sortKey="initialCapital" align="right" className="bg-amber-50/30 text-amber-800" />
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                              {sortedData.map((item, index) => (
                                <tr key={index} className="hover:bg-slate-50/80 transition-colors">
                                  <td className="py-2.5 px-2 font-medium text-slate-500">{item.itemCode}</td>
                                  <td className="py-2.5 px-2 font-bold text-slate-800">
                                      {item.itemName} <span className="text-slate-400 font-normal ml-1">({item.spec})</span>
                                  </td>
                                  <td className="py-2.5 px-2">
                                    <span className={`inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold shadow-sm border
                                        ${item.abcClass === 'A' ? 'bg-blue-50 text-blue-700 border-blue-200' : 
                                          item.abcClass === 'B' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 
                                          'bg-slate-50 text-slate-600 border-slate-200'}`}>
                                        {item.classLabel.split(' ')[0]}
                                    </span>
                                  </td>
                                  <td className="py-2.5 px-2 text-right text-slate-800 font-bold">{item.d.toFixed(1)}</td>
                                  <td className="py-2.5 px-2 text-right font-medium text-slate-700 border-l border-slate-100 bg-slate-50/30">
                                      {item.currentStock.toLocaleString()}
                                      {item.immediateRisk && <span className="ml-1 text-red-500 font-bold text-[10px]" title="实物库存已破红线，若无在途将断货!">(危)</span>}
                                  </td>
                                  <td className={`py-2.5 px-2 text-right font-mono bg-slate-50/30 ${item.immediateRisk ? 'text-red-600 font-bold' : 'text-slate-500'}`}>
                                    {item.physicalCoverDays === Infinity ? '无动销' : Math.round(item.physicalCoverDays)}
                                  </td>
                                  <td className="py-2.5 px-2 text-right text-emerald-600 font-bold bg-emerald-50/30 border-l border-emerald-50">
                                      {item.onOrderStock > 0 ? item.onOrderStock.toLocaleString() : <span className="text-emerald-200">-</span>}
                                  </td>
                                  <td className={`py-2.5 px-2 text-right font-bold bg-blue-50/50 border-l border-blue-100 shadow-inner ${item.isCritical ? 'text-red-600' : 'text-blue-900'}`}>
                                    {item.availableStock.toLocaleString()}
                                  </td>
                                  <td className={`py-2.5 px-2 text-right font-mono bg-blue-50/30 ${item.isCritical ? 'text-red-600 font-bold' : 'text-blue-800'}`}>
                                    {item.totalCoverDays === Infinity ? '无动销' : Math.round(item.totalCoverDays)}
                                  </td>
                                  <td className="py-2.5 px-2 text-center text-[10px] border-l border-rose-50">
                                    {item.promoLevel === 3 ? (
                                      <span className="inline-block px-2 py-0.5 rounded font-bold bg-slate-200 text-slate-700 border border-slate-300">{item.promoAction}</span>
                                    ) : item.promoLevel === 2 ? (
                                      <span className="inline-block px-2 py-0.5 rounded font-bold bg-rose-100 text-rose-700 border border-rose-200">{item.promoAction}</span>
                                    ) : item.promoLevel === 1 ? (
                                      <span className="inline-block px-2 py-0.5 rounded font-bold bg-amber-100 text-amber-700 border border-amber-200">{item.promoAction}</span>
                                    ) : (
                                      <span className="text-slate-400 font-medium">{item.promoAction}</span>
                                    )}
                                  </td>
                                  <td className="py-2.5 px-2 text-right font-bold text-rose-600 bg-rose-50/50 border-l border-rose-100/50 shadow-inner">
                                    {item.d > 0 && !item.isExcludedQt ? (
                                        <div className="flex items-center justify-end gap-1.5">
                                            <span>{item.rop.toLocaleString()}</span>
                                            <span className="text-[11px] text-slate-400 font-normal">/</span>
                                            <span className="text-slate-600 font-medium">{item.targetStock.toLocaleString()}</span>
                                        </div>
                                    ) : '-'}
                                  </td>
                                  <td className="py-2.5 px-2 text-right font-medium text-purple-700 bg-purple-50/30 border-l border-purple-50/50">
                                    {item.basePurchase > 0 ? item.basePurchase.toLocaleString() : '-'}
                                  </td>
                                  <td className="py-2.5 px-2 text-right font-bold text-purple-500 bg-purple-50/50">
                                    {item.padQty > 0 ? `+${item.padQty.toLocaleString()}` : <span className="text-slate-300 opacity-50">-</span>}
                                  </td>
                                  <td className={`py-2.5 px-2 text-right font-bold border-r border-purple-100/80 ${item.isExcludedQt ? 'bg-slate-50 text-slate-400' : (item.needsRestock ? 'bg-purple-100 text-purple-900 shadow-sm' : 'bg-slate-50 text-slate-300')}`}>
                                    {item.isExcludedQt ? (
                                      <span className="text-slate-400 text-[11px] font-normal">停补(建议分装)</span>
                                    ) : (item.d > 0 ? (
                                      item.actualPurchase > 0 ? (
                                        <div className="flex items-center justify-end gap-1.5 text-sm">
                                          {item.isCritical && <IconAlertCircle size={14} className="text-rose-500 animate-pulse" title="已跌破红线，告急！" />}
                                          {item.actualPurchase.toLocaleString()}
                                        </div>
                                      ) : '暂无需补'
                                    ) : '-')}
                                  </td>
                                  <td className="py-2.5 px-2 text-right font-mono font-medium text-amber-700 bg-amber-50/20">
                                    {item.initialCapital > 0 ? `¥${item.initialCapital.toLocaleString(undefined, {maximumFractionDigits:0})}` : '-'}
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                          {sortedData.length === 0 && (
                            <div className="p-10 text-center flex flex-col items-center justify-center opacity-50">
                                <IconSearch size={40} className="mb-4 text-slate-400" />
                                <p className="text-slate-500 font-bold">未找到符合条件的涂料型号</p>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}
                </main>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-in-right { animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</body>
</html>
